<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khách hàng - Cinema System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0f0f0f; color: #fff; }
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: #000; padding: 20px; border-right: 1px solid #222; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .sidebar nav a {
            display: block; padding: 12px 15px; margin-bottom: 8px;
            color: #bbb; text-decoration: none; border-radius: 8px;
        }
        .sidebar nav a.active, .sidebar nav a:hover { background: #fff; color: #000; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar('customers')}"></div>

    <div class="content">
        <div class="header flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-tight text-white">Quản lý Khách hàng</h1>
                <p class="text-gray-400 mt-1">Danh sách thành viên đăng ký và quản lý tài khoản.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="relative col-span-2">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm tên, email, số điện thoại..."
                       class="w-full bg-[#1a1a1a] border border-[#333] rounded-xl p-3 pl-10 text-white outline-none focus:border-white transition">
                <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-gray-500"></i>
            </div>

            <select id="statusFilter" onchange="filterTable()" class="bg-[#1a1a1a] border border-[#333] rounded-xl p-3 text-white outline-none focus:border-white cursor-pointer">
                <option value="">Tất cả trạng thái</option>
                <option value="Hoạt động">Hoạt động</option>
                <option value="Tạm khóa">Tạm khóa</option>
            </select>
        </div>

        <div class="bg-[#111] rounded-2xl border border-[#222] overflow-hidden shadow-2xl">
            <table class="w-full text-left" id="customerTable">
                <thead class="bg-[#000] border-b border-[#222]">
                <tr>
                    <th class="p-4 text-gray-500 font-medium uppercase text-xs">ID</th>
                    <th class="p-4 text-gray-500 font-medium uppercase text-xs">Họ và tên</th>
                    <th class="p-4 text-gray-500 font-medium uppercase text-xs">Thông tin liên hệ</th>
                    <th class="p-4 text-gray-500 font-medium uppercase text-xs">Ngày đăng ký</th>
                    <th class="p-4 text-gray-500 font-medium uppercase text-xs">Trạng thái</th>
                    <th class="p-4 text-gray-500 font-medium uppercase text-xs text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody id="customerTableBody">
                <tr th:each="c : ${customerList}" class="hover:bg-[#161616] transition border-b border-[#1a1a1a]">
                    <td class="p-4 text-gray-500 font-mono text-sm" th:text="${c.user_id}"></td>
                    <td class="p-4 font-bold text-white" th:text="${c.full_name}"></td>
                    <td class="p-4">
                        <div class="text-sm text-white" th:text="${c.email}"></div>
                        <div class="text-xs text-gray-500" th:text="${c.phone}"></div>
                    </td>
                    <td class="p-4 text-gray-400 text-sm" th:text="${#temporals.format(c.created_at, 'dd/MM/yyyy')}"></td>
                    <td class="p-4">
                        <div class="inline-flex items-center gap-2">
                            <span th:class="${c.status == 'active' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]'} + ' w-2 h-2 rounded-full'"></span>
                            <span th:text="${c.status == 'active' ? 'Hoạt động' : 'Tạm khóa'}" class="text-sm font-medium text-gray-300"></span>
                        </div>
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex justify-end items-center gap-4">
                            <button type="button"
                                    th:data-id="${c.user_id}"
                                    th:data-name="${c.full_name}"
                                    onclick="showHistory(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                    class="text-gray-500 hover:text-blue-400 transition" title="Lịch sử đặt vé">
                                <i data-lucide="ticket" class="w-5 h-5"></i>
                            </button>

                            <button type="button"
                                    th:data-id="${c.user_id}"
                                    th:data-name="${c.full_name}"
                                    th:data-status="${c.status}"
                                    onclick="handleEditClick(this)"
                                    class="text-gray-500 hover:text-white transition" title="Sửa trạng thái">
                                <i data-lucide="edit-3" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="customerModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md flex items-center justify-center z-50">
    <div class="bg-[#111] border border-[#333] rounded-3xl p-8 w-full max-w-lg shadow-2xl">
        <h2 class="text-2xl font-bold mb-6 text-white border-b border-[#222] pb-4 uppercase tracking-tighter">Cập nhật Trạng thái</h2>
        <form th:action="@{/admin/customers/update}" th:object="${editedCustomer}" method="POST" class="space-y-6">
            <input type="hidden" th:field="*{user_id}" id="form-id">
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">Họ tên khách hàng</label>
                <input type="text" th:field="*{full_name}" id="form-name" readonly class="w-full bg-[#1a1a1a] border border-[#333] rounded-xl p-3 text-gray-500 outline-none opacity-60">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest">Trạng thái tài khoản</label>
                <select th:field="*{status}" id="form-status" class="w-full bg-[#1a1a1a] border border-white rounded-xl p-3 text-white outline-none cursor-pointer">
                    <option value="active">Hoạt động</option>
                    <option value="inactive">Tạm khóa</option>
                </select>
            </div>
            <div class="flex justify-end gap-4 mt-8 pt-4 border-t border-[#222]">
                <button type="button" onclick="closeModal()" class="px-6 py-2.5 text-gray-400 font-bold hover:text-white transition uppercase text-sm">Hủy</button>
                <button type="submit" class="px-8 py-2.5 bg-blue-600 text-white rounded-xl font-black hover:bg-blue-700 transition uppercase text-sm">Xác nhận</button>
            </div>
        </form>
    </div>
</div>

<div id="bookingHistoryModal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[60]">
    <div class="bg-[#111] border border-[#333] rounded-3xl p-8 w-full max-w-5xl shadow-2xl max-h-[85vh] flex flex-col">
        <div class="flex justify-between items-center mb-6 border-b border-[#222] pb-4">
            <div>
                <h2 class="text-2xl font-bold text-white uppercase tracking-tighter">Lịch sử giao dịch</h2>
                <p class="text-blue-500 text-sm font-medium" id="historyCustomerName"></p>
            </div>
            <button onclick="closeHistoryModal()" class="text-gray-500 hover:text-white transition p-2">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="overflow-y-auto flex-1 pr-2 custom-scrollbar">
            <table class="w-full text-left">
                <thead class="sticky top-0 bg-[#111] border-b border-[#222] z-10">
                <tr>
                    <th class="p-4 text-gray-500 text-xs uppercase font-bold tracking-widest">Mã đơn</th>
                    <th class="p-4 text-gray-500 text-xs uppercase font-bold tracking-widest">Phim & Rạp</th>
                    <th class="p-4 text-gray-500 text-xs uppercase font-bold tracking-widest">Ghế</th>
                    <th class="p-4 text-gray-500 text-xs uppercase font-bold tracking-widest text-right">Tổng tiền</th>
                    <th class="p-4 text-gray-500 text-xs uppercase font-bold tracking-widest text-right">Ngày đặt</th>
                </tr>
                </thead>
                <tbody id="bookingHistoryTableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const statusValue = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('#customerTableBody tr');
        rows.forEach(row => {
            const name = row.cells[1].innerText.toLowerCase();
            const contact = row.cells[2].innerText.toLowerCase();
            const status = row.cells[4].innerText.trim();
            const matchesSearch = name.includes(searchText) || contact.includes(searchText);
            const matchesStatus = statusValue === "" || status.includes(statusValue);
            row.style.display = (matchesSearch && matchesStatus) ? "" : "none";
        });
    }

    async function showHistory(userId, fullName) {
        document.getElementById('historyCustomerName').innerText = "Khách hàng: " + fullName;
        const tableBody = document.getElementById('bookingHistoryTableBody');

        tableBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-500 animate-pulse">Đang tải lịch sử giao dịch...</td></tr>';
        document.getElementById('bookingHistoryModal').classList.remove('hidden');

        try {
            const response = await fetch(`/admin/customers/api/bookings/${userId}`);
            const bookings = await response.json();

            if (bookings.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-gray-600 italic">Khách hàng này chưa có đơn hàng nào.</td></tr>';
            } else {
                tableBody.innerHTML = bookings.map(b => `
                    <tr class="border-b border-[#1a1a1a] hover:bg-[#161616] transition">
                        <td class="p-4 font-mono text-blue-400 text-sm">#${b.booking_id}</td>
                        <td class="p-4">
                            <div class="font-bold text-white">${b.movie_title}</div>
                            <div class="text-[10px] text-gray-500 uppercase mt-1">${b.branch_name}</div>
                        </td>
                        <td class="p-4">
                            <span class="bg-blue-500/10 text-blue-500 text-[10px] font-bold px-2 py-1 rounded border border-blue-500/20">${b.seat_names}</span>
                        </td>
                        <td class="p-4 font-bold text-green-500 text-right">${new Intl.NumberFormat().format(b.total_amount)} đ</td>
                        <td class="p-4 text-right text-gray-500 text-xs font-mono">${b.booking_time.replace('T', ' ').substring(0, 16)}</td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            tableBody.innerHTML = '<tr><td colspan="5" class="p-20 text-center text-red-500 text-sm">Không thể tải dữ liệu. Vui lòng thử lại sau!</td></tr>';
        }
        lucide.createIcons();
    }

    function closeHistoryModal() {
        document.getElementById('bookingHistoryModal').classList.add('hidden');
    }

    // Hàm xử lý nút sửa: Nhận nguyên element để đọc data-attributes
    function handleEditClick(btn) {
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        const status = btn.getAttribute('data-status');

        document.getElementById('form-id').value = id;
        document.getElementById('form-name').value = name;
        document.getElementById('form-status').value = status;
        document.getElementById('customerModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('customerModal').classList.add('hidden');
    }

    window.onclick = function(e) {
        if (e.target.id === 'customerModal') closeModal();
        if (e.target.id === 'bookingHistoryModal') closeHistoryModal();
    }
</script>
</body>
</html>
