<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Detail - Cinema Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav th:replace="~{fragments/header :: navbar}"></nav>

<div class="container py-5" th:if="${booking != null}">
    <h2 class="mb-4">Booking Detail</h2>

    <div class="card">
        <div class="card-header">
            <strong>Booking #</strong><span th:text="${booking.bookingId}">1</span>
        </div>
        <div class="card-body">
            <p><strong>Movie:</strong> <span th:text="${booking.movieTitle}">Movie Title</span></p>
            <p><strong>Branch:</strong> <span th:text="${booking.branchName}">Branch</span></p>
            <p><strong>Room:</strong> <span th:text="${booking.roomName}">Room</span></p>
            <p><strong>Showtime:</strong>
                <span th:text="${#temporals.format(booking.showtimeStartTime, 'dd/MM/yyyy HH:mm')}">Date Time</span>
            </p>
            <p>
                <strong>Seats:</strong>
                <span th:if="${#lists.isEmpty(booking.seatLabels)}">N/A</span>
                <span th:if="${!#lists.isEmpty(booking.seatLabels)}"
                      th:text="${#strings.arrayJoin(booking.seatLabels.toArray(), ', ')}">
                    A1, A2
                </span>
            </p>
            <p><strong>Total Amount:</strong> <span th:text="${booking.totalAmount}">0</span></p>
            <p><strong>Status:</strong> <span th:text="${booking.status}">Status</span></p>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/my-bookings}" class="btn btn-secondary">Back to My Bookings</a>
        <a href="/" class="btn btn-primary">Back to Home</a>
    </div>
</div>

<div class="container py-5" th:if="${booking == null}">
    <div class="alert alert-warning">
        Booking not found.
    </div>
    <a th:href="@{/my-bookings}" class="btn btn-secondary">Back to My Bookings</a>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
    <div class="container">
        <p>&copy; 2026 Cinema Management System - Team 6. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
