<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý thể loại - Cinema System</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .alert {
            padding: 10px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 14px;
            border: 1px solid transparent;
        }
        .alert-error {
            background: #2a1f1f;
            color: #fca5a5;
            border-color: #3a1f1f;
        }
        .alert-success {
            background: #1f2f26;
            color: #86efac;
            border-color: #1f3b2f;
        }
        .status-active {
            background: #1f2f26;
            color: #86efac;
        }
        .status-inactive {
            background: #2a1f1f;
            color: #fca5a5;
        }
    </style>
</head>
<body>

<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar('genres')}"></div>

    <main class="content">
        <div class="header">
            <div>
                <h1>Quản lý thể loại</h1>
                <p>Thêm, cập nhật và kích hoạt/ngưng kích hoạt thể loại.</p>
            </div>
            <button type="button" onclick="openModalAdd()" class="btn-add">
                <i data-lucide="plus-circle"></i>
                Thêm thể loại
            </button>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <div class="filters">
            <div class="search-box has-icon">
                <span class="search-icon">
                    <i data-lucide="search"></i>
                </span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm theo tên thể loại...">
            </div>

            <select id="statusFilter" onchange="filterTable()" class="filter-select">
                <option value="">Tất cả trạng thái</option>
                <option value="active">active</option>
                <option value="inactive">inactive</option>
            </select>
        </div>

        <div class="table-card">
            <table class="data-table" id="genreTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Tên thể loại</th>
                    <th>Mô tả</th>
                    <th>Trạng thái</th>
                    <th class="text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="genre : ${genreList}">
                    <td class="mono text-muted" th:text="${genre.genreId}"></td>
                    <td th:text="${genre.genreName}"></td>
                    <td class="text-muted" th:text="${genre.description}"></td>
                    <td>
                        <a th:href="@{'/admin/genres/toggle/' + ${genre.genreId}}" class="visibility-link">
                            <span th:class="'visibility-dot ' + (${genre.status} == 'active' ? 'dot-shown' : 'dot-hidden')"></span>
                            <span th:text="${genre.status}"
                                  th:class="'visibility-label ' + (${genre.status} == 'active' ? 'text-success' : 'text-muted')"></span>
                        </a>
                    </td>
                    <td class="text-right">
                        <div class="action-buttons">
                            <button type="button" th:onclick="prepareEdit([[${genre}]])" class="icon-btn">
                                <i data-lucide="edit-3"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </main>
</div>

<div id="genreModal" class="modal-backdrop hidden">
    <div class="modal">
        <h2 id="modalTitle" class="modal-title">Thêm thể loại mới</h2>
        <form th:action="@{/admin/genres/save}" th:object="${newGenre}" method="POST" id="genreForm">
            <input type="hidden" th:field="*{genreId}" id="form-id">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">Tên thể loại</label>
                    <input type="text" th:field="*{genreName}" id="form-name" required class="form-input">
                </div>
                <div class="form-group full">
                    <label class="form-label">Mô tả</label>
                    <textarea rows="3" th:field="*{description}" id="form-description" class="form-textarea"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Trạng thái</label>
                    <select th:field="*{status}" id="form-status" class="form-select">
                        <option value="active">active</option>
                        <option value="inactive">inactive</option>
                    </select>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" onclick="closeModal()" class="btn-secondary">Hủy</button>
                <button type="submit" class="btn-primary">Lưu dữ liệu</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const statusValue = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('tbody tr');

        rows.forEach(row => {
            const name = row.cells[1].innerText.toLowerCase();
            const status = row.cells[3].innerText.trim().toLowerCase();

            const matchesSearch = name.includes(searchText);
            const matchesStatus = statusValue === "" || status === statusValue;

            row.style.display = (matchesSearch && matchesStatus) ? "" : "none";
        });
    }

    function openModalAdd() {
        document.getElementById('modalTitle').innerText = "Thêm thể loại mới";
        document.getElementById('genreForm').reset();
        document.getElementById('form-id').value = "";
        document.getElementById('form-status').value = "active";
        document.getElementById('genreModal').classList.remove('hidden');
    }

    function prepareEdit(genre) {
        document.getElementById('modalTitle').innerText = "Cập nhật thể loại";
        document.getElementById('form-id').value = genre.genreId;
        document.getElementById('form-name').value = genre.genreName || "";
        document.getElementById('form-description').value = genre.description || "";
        document.getElementById('form-status').value = genre.status || "active";
        document.getElementById('genreModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('genreModal').classList.add('hidden');
    }

    window.onclick = function(event) {
        const modal = document.getElementById('genreModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
