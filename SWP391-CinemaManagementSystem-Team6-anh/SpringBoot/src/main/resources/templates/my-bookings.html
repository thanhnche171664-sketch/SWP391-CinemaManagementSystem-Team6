<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Cinema Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">Cinema Management System</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/movies}">Movies</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/showtimes}">Showtimes</a>
                </li>
                <li class="nav-item" th:if="${user == null}">
                    <a class="nav-link" th:href="@{/auth/login}">Login</a>
                </li>
                <li class="nav-item" th:if="${user != null}">
                    <span class="nav-link disabled" th:text="${user.fullName}">User</span>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">My Bookings</h2>

    <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-info">
        You have no bookings yet.
    </div>

    <div th:if="${!#lists.isEmpty(bookings)}" class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>ID</th>
                <th>Movie</th>
                <th>Branch</th>
                <th>Room</th>
                <th>Showtime</th>
                <th>Seats</th>
                <th>Total</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.bookingId}">1</td>
                <td th:text="${booking.movieTitle}">Movie</td>
                <td th:text="${booking.branchName}">Branch</td>
                <td th:text="${booking.roomName}">Room</td>
                <td th:text="${#temporals.format(booking.showtimeStartTime, 'dd/MM/yyyy HH:mm')}">Time</td>
                <td th:text="${#strings.arrayJoin(booking.seatLabels.toArray(), ', ')}">A1, A2</td>
                <td th:text="${booking.totalAmount}">0</td>
                <td th:text="${booking.status}">Status</td>
                <td>
                    <a th:href="@{/my-bookings/{id}(id=${booking.bookingId})}" class="btn btn-sm btn-primary">
                        View
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-4">
        <a href="/" class="btn btn-secondary">Back to Home</a>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-4">
    <div class="container">
        <p>&copy; 2026 Cinema Management System - Team 6. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
