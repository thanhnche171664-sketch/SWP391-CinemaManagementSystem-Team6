<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý rạp chiếu</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
</head>
<body>

<div class="layout">

    <div th:replace="fragments/sidebar :: sidebar('branches')"></div>

    <main class="content">

        <header class="header">
            <div>
                <h1>Quản lý rạp chiếu</h1>
                <p>Quản lý rạp, phòng chiếu và ghế ngồi</p>
            </div>

            <a class="btn-add" href="/branches/new">+ Thêm rạp mới</a>
        </header>

        <form class="search-box" th:action="@{/branches/search}" method="get">
            <input type="text"
                   name="keyword"
                   placeholder="Tìm kiếm theo tên rạp"
                   th:value="${keyword}">
        </form>

        <div class="branch-list">

            <div class="branch-card" th:each="branch : ${branches}">

                <div class="branch-header">
                    <div>
                        <h2 th:text="${branch.branchName}">Tên rạp</h2>
                        <p th:text="${branch.city}">Thành phố</p>
                        <p th:text="${branch.address}">Địa chỉ</p>

                        <span class="status"
                              th:classappend="${branch.status.name() == 'active'
                                  ? 'active' : 'inactive'}"
                              th:text="${branch.status.name() == 'active'
                                  ? 'Đang hoạt động'
                                  : 'Ngưng hoạt động'}">
                        </span>
                    </div>

                    <div class="actions">

                        <a th:href="@{/branches/edit/{id}(id=${branch.branchId})}"
                           title="Chỉnh sửa" style="color:#aaa">Chỉnh sửa</a>

                        <a th:href="@{/branches/toggle-status/{id}(id=${branch.branchId})}"
                           th:title="${branch.status.name() == 'active'
                               ? 'Ngưng hoạt động'
                               : 'Kích hoạt'}"
                           th:text="${branch.status.name() == 'active'
                               ? '🚫'
                               : '✅'}"
                           class="status-btn">
                        </a>

                    </div>
                </div>

                <div class="rooms">
                    <div class="room-card"
                         th:each="room : ${branch.rooms}">
                        <h4 th:text="${room.roomName}">Phòng</h4>
                        <p>
                            <span th:text="${room.totalSeats}">0</span> ghế
                        </p>
                        <button class="room-edit-btn"
                                type="button"
                                th:onclick="|window.location.href='/rooms/${room.roomId}'|"
                                title="Sửa phòng">
                            ✏️
                        </button>
                    </div>



                    <p th:if="${#lists.isEmpty(branch.rooms)}"
                       style="color:#aaa;margin-top:10px">
                        Chưa có phòng chiếu
                    </p>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
