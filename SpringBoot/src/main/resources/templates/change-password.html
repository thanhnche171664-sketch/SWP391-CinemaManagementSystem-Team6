<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đổi mật khẩu - Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="change-password-page">
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<section class="container py-4">
    <div class="change-password-shell">
        <div class="change-password-hero">
            <div>
                <h2 class="mb-1">Đổi mật khẩu</h2>
                <p class="change-password-subtitle mb-0">Cập nhật mật khẩu mới để bảo vệ tài khoản của bạn.</p>
            </div>
            <a th:href="@{/profile}" class="btn btn-outline-light change-password-btn-secondary">Quay lại hồ sơ</a>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mt-3" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="change-password-card mt-3">
            <form th:action="@{/profile/change-password}" th:object="${passwordDTO}" method="post">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Mật khẩu hiện tại</label>
                        <input type="password"
                               class="form-control"
                               th:field="*{oldPassword}"
                               th:classappend="${#fields.hasErrors('oldPassword')} ? 'is-invalid' : ''"
                               placeholder="Nhập mật khẩu cũ">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Mật khẩu mới</label>
                        <input type="password"
                               class="form-control"
                               th:field="*{newPassword}"
                               th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                               placeholder="Tối thiểu 8 ký tự">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                        <small class="form-text change-password-hint" th:unless="${#fields.hasErrors('newPassword')}">
                            Mật khẩu nên có chữ hoa, chữ thường và số.
                        </small>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Xác nhận mật khẩu</label>
                        <input type="password"
                               class="form-control"
                               th:field="*{confirmPassword}"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                               placeholder="Nhập lại mật khẩu mới">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>
                </div>

                <div class="change-password-actions mt-4">
                    <a th:href="@{/profile}" class="btn btn-outline-light change-password-btn-secondary">Hủy</a>
                    <button type="submit" class="btn change-password-btn-primary">Cập nhật mật khẩu</button>
                </div>
            </form>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
