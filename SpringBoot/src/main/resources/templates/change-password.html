<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Giúp giao diện mượt mà hơn khi hiển thị lỗi */
        .invalid-feedback {
            display: block;
            min-height: 1.2em;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 card p-4 shadow-sm">
            <h3 class="text-center mb-4">Đổi Mật Khẩu</h3>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/profile/change-password}" th:object="${passwordDTO}" method="post">

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Mật khẩu hiện tại</label>
                    <input type="password"
                           class="form-control"
                           th:field="*{oldPassword}"
                           th:classappend="${#fields.hasErrors('oldPassword')} ? 'is-invalid' : ''"
                           placeholder="Nhập mật khẩu cũ">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('oldPassword')}" th:errors="*{oldPassword}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Mật khẩu mới</label>
                    <input type="password"
                           class="form-control"
                           th:field="*{newPassword}"
                           th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid' : ''"
                           placeholder="Nhập mật khẩu mới">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
                    <small class="form-text text-muted" th:unless="${#fields.hasErrors('newPassword')}">
                        Mật khẩu phải từ 8 ký tự, bao gồm cả chữ và số.
                    </small>
                </div>

                <div class="mb-3">
                    <label class="form-label font-weight-bold">Xác nhận mật khẩu mới</label>
                    <input type="password"
                           class="form-control"
                           th:field="*{confirmPassword}"
                           th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                           placeholder="Nhập lại mật khẩu mới">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a th:href="@{/profile}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                    <button type="submit" class="btn btn-warning px-4">Cập nhật mật khẩu</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
