<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch sử đặt vé</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>Chào <span th:text="${user.fullName}"></span>, đây là lịch sử đặt vé của bạn</h3>
        <a href="/" class="btn btn-outline-secondary btn-sm">Quay lại trang chủ</a>
    </div>

    <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${success}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm border-0">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>Mã đơn</th>
                    <th>Phim</th>
                    <th>Rạp/Phòng</th>
                    <th>Thời gian chiếu</th>
                    <th>Tổng tiền</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="b : ${bookings}">
                    <td th:text="'#' + ${b.bookingId}"></td>
                    <td>
                        <strong th:text="${b.movieTitle}"></strong>
                    </td>
                    <td>
                        <span th:text="${b.branchName}"></span><br/>
                        <small class="text-muted" th:text="${b.roomName}"></small>
                    </td>
                    <td>
                        <small>Bắt đầu: <span th:text="${#temporals.format(b.showtimeStart, 'dd/MM/yyyy HH:mm')}"></span></small><br/>
                        <small>Kết thúc: <span th:text="${#temporals.format(b.showtimeEnd, 'dd/MM/yyyy HH:mm')}"></span></small>
                    </td>
                    <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(b.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                    <td>
                        <span th:class="${b.status.name() == 'SUCCESS' ? 'badge bg-success' : 'badge bg-warning'}"
                              th:text="${b.status}"></span>
                    </td>
                    <td>
                        <div th:if="${b.status.name() == 'SUCCESS'}">
                            <button th:if="${T(java.time.LocalDateTime).now().isAfter(b.showtimeEnd)}"
                                    class="btn btn-primary btn-sm"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="'#reviewModal' + ${b.bookingId}">
                                Đánh giá
                            </button>

                            <span th:if="${T(java.time.LocalDateTime).now().isBefore(b.showtimeEnd)}"
                                  class="badge bg-light text-dark border"
                                  title="Bạn có thể đánh giá sau khi xem xong phim">
                                Chờ xem xong
                            </span>
                        </div>
                        <span th:unless="${b.status.name() == 'SUCCESS'}" class="text-muted small">N/A</span>

                        <div class="modal fade" th:id="'reviewModal' + ${b.bookingId}" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog">
                                <form th:action="@{/customer/review/add}" method="post">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <h5 class="modal-title">Đánh giá phim: [[${b.movieTitle}]]</h5>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                        </div>
                                        <div class="modal-body text-start">
                                            <input type="hidden" name="bookingId" th:value="${b.bookingId}">

                                            <div class="mb-3">
                                                <label class="form-label">Mức độ hài lòng:</label>
                                                <select name="rating" class="form-select" required>
                                                    <option value="5">5 ⭐ - Tuyệt vời</option>
                                                    <option value="4">4 ⭐ - Rất tốt</option>
                                                    <option value="3">3 ⭐ - Bình thường</option>
                                                    <option value="2">2 ⭐ - Tệ</option>
                                                    <option value="1">1 ⭐ - Rất tệ</option>
                                                </select>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Cảm nghĩ của bạn:</label>
                                                <textarea name="comment" class="form-control" rows="3"
                                                          placeholder="Phim có hay không? Bạn thích điều gì nhất?" required></textarea>
                                            </div>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                            <button type="submit" class="btn btn-success">Gửi đánh giá</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(bookings)}">
                    <td colspan="7" class="text-center py-4">Bạn chưa có lịch sử đặt vé nào.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
