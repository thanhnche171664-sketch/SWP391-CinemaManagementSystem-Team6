<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý nhân viên - CinemaGO</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-user-management.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar('staff')}"></div>

    <main class="content">
        <div th:if="${success}" class="alert alert-success">
            <i data-lucide="check-circle"></i>
            <span th:text="${success}"></span>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <i data-lucide="alert-circle"></i>
            <span th:text="${error}"></span>
        </div>

        <div class="header">
            <div>
                <h1>Quản lý nhân viên</h1>
                <p class="page-subtitle">Đội ngũ nhân sự và phân quyền hệ thống</p>
            </div>
            <button onclick="openModalAdd()" class="btn-add">
                <i data-lucide="plus-circle"></i>
                Thêm nhân viên
            </button>
        </div>

        <div class="filters">
            <div class="search-box has-icon">
                <span class="search-icon"><i data-lucide="search"></i></span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm tên, email..."
                       class="form-input">
            </div>

            <select id="roleFilter" onchange="filterTable()" class="filter-select">
                <option value="">Tất cả chức vụ</option>
                <option value="MANAGER">MANAGER</option>
                <option value="STAFF">STAFF</option>
            </select>

            <select id="branchFilter" onchange="filterTable()" class="filter-select">
                <option value="">Tất cả chi nhánh</option>
                <option th:each="b : ${branches}" th:value="${b.branchName}" th:text="${b.branchName}"></option>
            </select>

            <select id="statusFilter" onchange="filterTable()" class="filter-select">
                <option value="">Tất cả trạng thái</option>
                <option value="Hoạt động">Hoạt động</option>
                <option value="Tạm khóa">Tạm khóa</option>
            </select>
        </div>

        <div class="table-card">
            <table class="data-table" id="staffTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Thông tin nhân viên</th>
                    <th>Chức vụ</th>
                    <th>Chi nhánh</th>
                    <th>Trạng thái</th>
                    <th class="text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody id="staffTableBody">
                <tr th:each="staff : ${staffList}">
                    <td class="mono text-muted" th:text="${staff.user_id}"></td>
                    <td>
                        <div class="entity-name" th:text="${staff.full_name}"></div>
                        <div class="entity-sub" th:text="${staff.email}"></div>
                    </td>
                    <td>
                        <span class="role-badge"
                              th:classappend="${staff.role == 'ADMIN' ? ' role-admin' : (staff.role == 'MANAGER' ? ' role-manager' : ' role-staff')}"
                              th:text="${staff.role}"></span>
                    </td>
                    <td th:text="${staff.branch_name}"></td>
                    <td>
                        <a th:href="@{'/admin/staff/toggle/' + ${staff.user_id}}" class="status-toggle">
                            <span class="status-badge-soft"
                                  th:classappend="${staff.status == 'active' ? ' active' : ' inactive'}"
                                  th:text="${staff.status == 'active' ? 'Hoạt động' : 'Tạm khóa'}"></span>
                        </a>
                    </td>
                    <td class="action-cell">
                        <div class="action-buttons">
                            <button th:onclick="prepareEdit([[${staff}]])" class="icon-btn" type="button">
                                <i data-lucide="edit-2"></i>
                            </button>
                            <a th:href="@{'/admin/staff/delete/' + ${staff.user_id}}"
                               onclick="return confirm('Bạn có chắc chắn muốn TẠM KHÓA nhân viên này?')"
                               class="icon-btn">
                                <i data-lucide="user-minus"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="table-footer" th:if="${totalPages > 0}">
                <div class="text-muted">
                    Trang <strong th:text="${currentPage + 1}"></strong> / <span th:text="${totalPages}"></span>
                </div>
                <div class="pagination">
                    <a th:href="@{/admin/staff(page=${currentPage - 1})}"
                       th:classappend="${currentPage == 0} ? ' disabled' : ''"
                       class="page-link">
                        <i data-lucide="chevron-left"></i>
                    </a>
                    <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                       th:href="@{/admin/staff(page=${i})}"
                       th:text="${i + 1}"
                       th:classappend="${currentPage == i} ? ' active' : ''"
                       class="page-link">
                    </a>
                    <a th:href="@{/admin/staff(page=${currentPage + 1})}"
                       th:classappend="${currentPage + 1 >= totalPages} ? ' disabled' : ''"
                       class="page-link">
                        <i data-lucide="chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="staffModal" class="modal-backdrop hidden">
    <div class="modal" style="max-width: 760px;">
        <h2 id="modalTitle" class="modal-title">Nhân viên</h2>
        <form th:action="@{/admin/staff/save}" th:object="${newStaff}" method="POST" id="staffForm" class="form-grid">
            <input type="hidden" th:field="*{user_id}" id="form-id">
            <div class="form-group full">
                <label class="form-label">Họ tên</label>
                <input type="text" th:field="*{full_name}" id="form-name" required class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" id="form-email" required class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">SĐT (10 số)</label>
                <input type="text" th:field="*{phone}" id="form-phone" required pattern="\d{10}" class="form-input">
            </div>
            <div class="form-group full">
                <label class="form-label">Mật khẩu</label>
                <input type="password" th:field="*{password}" id="form-password" class="form-input">
                <p id="passwordHint" class="text-muted" style="font-size: 12px;"></p>
            </div>
            <div class="form-group">
                <label class="form-label">Vai trò</label>
                <select th:field="*{role}" id="form-role" class="form-select">
                    <option value="STAFF">STAFF</option>
                    <option value="MANAGER">MANAGER</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Trạng thái</label>
                <select th:field="*{status}" id="form-status" class="form-select">
                    <option value="active">Hoạt động</option>
                    <option value="inactive">Tạm khóa</option>
                </select>
            </div>
            <div class="form-group full">
                <label class="form-label">Chi nhánh</label>
                <select th:field="*{branch_id}" id="form-branch" class="form-select">
                    <option value="">-- Toàn hệ thống --</option>
                    <option th:each="b : ${branches}" th:value="${b.branchId}" th:text="${b.branchName}"></option>
                </select>
            </div>
            <div class="modal-actions" style="grid-column: span 2;">
                <button type="button" onclick="closeModal()" class="btn-secondary">Hủy</button>
                <button type="submit" id="submitBtn" class="btn-primary">
                    Lưu thay đổi
                </button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const roleValue = document.getElementById('roleFilter').value;
        const branchValue = document.getElementById('branchFilter').value;
        const statusValue = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('#staffTableBody tr');

        rows.forEach(row => {
            const name = row.cells[1].innerText.toLowerCase();
            const role = row.cells[2].innerText.trim();
            const branch = row.cells[3].innerText.trim();
            const status = row.cells[4].innerText.trim();
            const matchesSearch = name.includes(searchText);
            const matchesRole = roleValue === "" || role === roleValue;
            const matchesBranch = branchValue === "" || branch === branchValue;
            const matchesStatus = statusValue === "" || status.includes(statusValue);
            row.style.display = (matchesSearch && matchesRole && matchesBranch && matchesStatus) ? "" : "none";
        });
    }

    function openModalAdd() {
        document.getElementById('modalTitle').innerText = "Thêm nhân viên";
        document.getElementById('submitBtn').innerText = "Tạo tài khoản";
        document.getElementById('staffForm').reset();
        document.getElementById('form-id').value = "";
        document.getElementById('form-password').placeholder = "Mặc định: 123456";
        document.getElementById('passwordHint').innerText = "* Nếu để trống, mật khẩu mặc định là 123456";
        document.getElementById('staffModal').classList.remove('hidden');
    }

    function prepareEdit(staff) {
        document.getElementById('modalTitle').innerText = "Cập nhật";
        document.getElementById('submitBtn').innerText = "Cập nhật";
        document.getElementById('form-id').value = staff.user_id;
        document.getElementById('form-name').value = staff.full_name;
        document.getElementById('form-email').value = staff.email;
        document.getElementById('form-phone').value = staff.phone;
        document.getElementById('form-status').value = staff.status;
        document.getElementById('form-branch').value = staff.branch_id || "";
        document.getElementById('form-role').value = staff.role;
        document.getElementById('form-password').value = "";
        document.getElementById('form-password').placeholder = "Để trống nếu không đổi";
        document.getElementById('passwordHint').innerText = "* Để trống nếu không muốn thay đổi mật khẩu hiện tại";
        document.getElementById('staffModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('staffModal').classList.add('hidden');
    }

    document.getElementById('staffForm').onsubmit = function(e) {
        const phone = document.getElementById('form-phone').value;
        if (!/^\d{10}$/.test(phone)) {
            alert("Số điện thoại phải có 10 chữ số!");
            e.preventDefault();
            return false;
        }
        return true;
    };

    window.onclick = function(event) {
        if (event.target === document.getElementById('staffModal')) closeModal();
    }
</script>
</body>
</html>
