<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý nhân viên - Cinema System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #1f5aa6;
            --text-color: #1f3b67;
            --text-muted: #6a7a93;
            --surface-color: #ffffff;
            --surface-muted: #fff5f7;
            --border-soft: #f0c9d1;
            --accent-pink: #ffe9ed;
            --accent-pink-strong: #fff0f3;
        }

        body.admin-tone { background: var(--surface-muted); color: var(--text-color); }
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--surface-color); padding: 20px; border-right: 1px solid var(--border-soft); }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .sidebar nav a {
            display: block; padding: 12px 15px; margin-bottom: 8px;
            color: var(--text-muted); text-decoration: none; border-radius: 8px;
        }
        .sidebar nav a.active, .sidebar nav a:hover { background: var(--accent-pink); color: var(--text-color); }
        .sidebar nav a.active { background: var(--primary-color); color: #fff; }
        .logo { margin-bottom: 30px; font-size: 18px; font-weight: 700; letter-spacing: 0.2px; color: var(--text-color); }

        .panel-title { color: var(--text-color); }
        .panel-subtitle { color: var(--text-muted); }

        .panel-primary-btn {
            background: var(--primary-color);
            color: #fff;
        }

        .panel-primary-btn:hover {
            background: #184a8a;
        }

        .panel-input,
        .panel-select {
            background: #fff !important;
            border: 1px solid var(--border-soft) !important;
            color: var(--text-color) !important;
        }

        .panel-card {
            background: #fff;
            border: 1px solid var(--border-soft);
            box-shadow: 0 12px 30px rgba(31, 90, 166, 0.08);
        }

        .panel-thead { background: var(--accent-pink-strong); border-bottom: 1px solid var(--border-soft); }
        .panel-row { border-bottom: 1px solid var(--border-soft); }
        .panel-row:hover { background: #fff6f7; }

        .panel-muted { color: var(--text-muted); }
        .panel-strong { color: var(--text-color); }

        #staffModal { background: rgba(31, 59, 103, 0.25); }
        .panel-modal {
            background: #fff;
            border: 1px solid var(--border-soft);
            box-shadow: 0 20px 60px rgba(31, 90, 166, 0.2);
        }
        .panel-modal-title { color: var(--text-color); border-bottom: 1px solid var(--border-soft); }
        .panel-divider { border-top: 1px solid var(--border-soft); }
        .panel-btn-secondary { color: var(--text-muted); }
        .panel-btn-secondary:hover { color: var(--text-color); }
        .panel-btn-primary {
            background: var(--primary-color);
            color: #fff;
        }
        .panel-btn-primary:hover { background: #184a8a; }
    </style>
</head>
<body class="admin-tone">

<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar('staff')}"></div>

    <div class="content">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-tight panel-title">Quản lý nhân viên</h1>
                <p class="mt-1 panel-subtitle">Đội ngũ nhân sự & Phân quyền hệ thống</p>
            </div>
            <button onclick="openModalAdd()" class="panel-primary-btn px-6 py-2.5 rounded-xl flex items-center gap-2 transition font-bold shadow-lg">
                <i data-lucide="plus-circle" class="w-5 h-5"></i>
                Thêm nhân viên
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="relative">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm tên, email..."
                       class="panel-input w-full rounded-xl p-3 pl-10 outline-none transition">
                <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 panel-muted"></i>
            </div>

            <select id="roleFilter" onchange="filterTable()" class="panel-select rounded-xl p-3 outline-none cursor-pointer">
                <option value="">Tất cả chức vụ</option>
                <option value="MANAGER">MANAGER</option>
                <option value="STAFF">STAFF</option>
            </select>

            <select id="branchFilter" onchange="filterTable()" class="panel-select rounded-xl p-3 outline-none cursor-pointer">
                <option value="">Tất cả chi nhánh</option>
                <option th:each="b : ${branches}" th:value="${b.branchName}" th:text="${b.branchName}"></option>
            </select>

            <select id="statusFilter" onchange="filterTable()" class="panel-select rounded-xl p-3 outline-none cursor-pointer">
                <option value="">Tất cả trạng thái</option>
                <option value="Hoạt động">Hoạt động</option>
                <option value="Tạm khóa">Tạm khóa</option>
            </select>
        </div>

        <div class="panel-card rounded-2xl overflow-hidden">
            <table class="panel-table w-full text-left" id="staffTable">
                <thead class="panel-thead">
                <tr>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">ID</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Thông tin nhân viên</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Chức vụ</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Chi nhánh</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Trạng thái</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody id="staffTableBody">
                <tr th:each="staff : ${staffList}" class="panel-row transition">
                    <td class="p-4 panel-muted font-mono text-sm" th:text="${staff.user_id}"></td>
                    <td class="p-4">
                        <div class="font-bold panel-strong" th:text="${staff.full_name}"></div>
                        <div class="text-xs panel-muted" th:text="${staff.email}"></div>
                    </td>
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-lg text-[10px] font-black tracking-widest uppercase border"
                              th:classappend="${staff.role == 'ADMIN' ? 'border-red-500 text-red-500' : (staff.role == 'MANAGER' ? 'border-blue-500 text-blue-500' : 'border-green-500 text-green-500')}"
                              th:text="${staff.role}"></span>
                    </td>
                    <td class="p-4 panel-strong" th:text="${staff.branch_name}"></td>
                    <td class="p-4">
                        <a th:href="@{'/admin/staff/toggle/' + ${staff.user_id}}" class="inline-flex items-center gap-2">
                            <span th:class="${staff.status == 'active' ? 'bg-green-500' : 'bg-red-500'} + ' w-2 h-2 rounded-full shadow-[0_0_8px_rgba(34,197,94,0.6)]'"></span>
                            <span th:text="${staff.status == 'active' ? 'Hoạt động' : 'Tạm khóa'}" class="text-sm font-medium panel-strong"></span>
                        </a>
                    </td>
                    <td class="p-4 text-right">
                        <div class="flex justify-end gap-3">
                            <button th:onclick="prepareEdit([[${staff}]])" class="panel-muted hover:text-[#1f5aa6] transition">
                                <i data-lucide="edit-2" class="w-5 h-5"></i>
                            </button>
                            <a th:href="@{'/admin/staff/delete/' + ${staff.user_id}}" onclick="return confirm('Xóa nhân viên này?')" class="panel-muted hover:text-red-500 transition">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="staffModal" class="hidden fixed inset-0 backdrop-blur-md flex items-center justify-center z-50">
    <div class="panel-modal rounded-3xl p-8 w-full max-w-lg">
        <h2 id="modalTitle" class="panel-modal-title text-2xl font-bold mb-6 pb-4 uppercase tracking-tighter">Nhân viên</h2>
        <form th:action="@{/admin/staff/save}" th:object="${newStaff}" method="POST" id="staffForm" class="space-y-5">
            <input type="hidden" th:field="*{user_id}" id="form-id">

            <div>
                <label class="block text-xs font-bold panel-muted uppercase mb-2">Họ tên</label>
                <input type="text" th:field="*{full_name}" id="form-name" required class="panel-input w-full rounded-xl p-3 outline-none transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold panel-muted uppercase mb-2">Email</label>
                    <input type="email" th:field="*{email}" id="form-email" required class="panel-input w-full rounded-xl p-3 outline-none transition">
                </div>
                <div>
                    <label class="block text-xs font-bold panel-muted uppercase mb-2">SĐT</label>
                    <input type="text" th:field="*{phone}" id="form-phone" required class="panel-input w-full rounded-xl p-3 outline-none transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold panel-muted uppercase mb-2">Mật khẩu</label>
                <input type="password" th:field="*{password}" id="form-password" class="panel-input w-full rounded-xl p-3 outline-none transition">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold panel-muted uppercase mb-2">Vai trò</label>
                    <select th:field="*{role}" id="form-role" class="panel-select w-full rounded-xl p-3 outline-none transition">
                        <option value="STAFF">STAFF</option>
                        <option value="MANAGER">MANAGER</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold panel-muted uppercase mb-2">Trạng thái</label>
                    <select th:field="*{status}" id="form-status" class="panel-select w-full rounded-xl p-3 outline-none transition">
                        <option value="active">Hoạt động</option>
                        <option value="inactive">Tạm khóa</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold panel-muted uppercase mb-2">Chi nhánh</label>
                <select th:field="*{branch_id}" id="form-branch" class="panel-select w-full rounded-xl p-3 outline-none transition">
                    <option value="">-- Toàn hệ thống --</option>
                    <option th:each="b : ${branches}" th:value="${b.branchId}" th:text="${b.branchName}"></option>
                </select>
            </div>

            <div class="panel-divider flex justify-end gap-4 mt-8 pt-4">
                <button type="button" onclick="closeModal()" class="panel-btn-secondary px-6 py-2.5 font-bold transition">HỦY</button>
                <button type="submit" class="panel-btn-primary px-8 py-2.5 rounded-xl font-black transition">LƯU THAY ĐỔI</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const roleValue = document.getElementById('roleFilter').value;
        const branchValue = document.getElementById('branchFilter').value;
        const statusValue = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('#staffTableBody tr');

        rows.forEach(row => {
            const name = row.cells[1].innerText.toLowerCase();
            const role = row.cells[2].innerText.trim();
            const branch = row.cells[3].innerText.trim();
            const status = row.cells[4].innerText.trim();

            const matchesSearch = name.includes(searchText);
            const matchesRole = roleValue === "" || role === roleValue;
            const matchesBranch = branchValue === "" || branch === branchValue;
            const matchesStatus = statusValue === "" || status.includes(statusValue);

            row.style.display = (matchesSearch && matchesRole && matchesBranch && matchesStatus) ? "" : "none";
        });
    }

    function openModalAdd() {
        document.getElementById('modalTitle').innerText = "Thêm nhân viên";
        document.getElementById('staffForm').reset();
        document.getElementById('form-id').value = "";
        document.getElementById('form-password').placeholder = "Mặc định: 123456";
        document.getElementById('staffModal').classList.remove('hidden');
    }

    function prepareEdit(staff) {
        document.getElementById('modalTitle').innerText = "Cập nhật";
        document.getElementById('form-id').value = staff.user_id;
        document.getElementById('form-name').value = staff.full_name;
        document.getElementById('form-email').value = staff.email;
        document.getElementById('form-phone').value = staff.phone;
        document.getElementById('form-status').value = staff.status;
        document.getElementById('form-branch').value = staff.branch_id || "";
        document.getElementById('form-role').value = staff.role;
        document.getElementById('form-password').value = "";
        document.getElementById('form-password').placeholder = "Để trống nếu không đổi";
        document.getElementById('staffModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('staffModal').classList.add('hidden');
    }

    window.onclick = function(event) {
        const modal = document.getElementById('staffModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
