<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chi tiết đặt vé - CinemaHub</title>
    <link rel="stylesheet" th:href="@{/styles/auth.css}">
    <style>
        .page-wrap { min-height: 100vh; background: #0a0a0a; color: #fff; display: flex; flex-direction: column; }
        .main-wrap { flex: 1; padding: 24px; max-width: 560px; margin: 0 auto; width: 100%; }
        .detail-card { background: rgba(22,22,22,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px; }
        .detail-card h1 { font-size: 1.25rem; margin-bottom: 24px; }
        .row { margin-bottom: 12px; color: #ccc; }
        .row strong { color: #fff; display: inline-block; min-width: 120px; }
        .detail-card a { display: inline-block; margin-top: 24px; color: #e50914; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body class="page-wrap">
    <header class="auth-header">
        <a th:href="@{/movies}" class="auth-logo">
            <span class="auth-logo-icon">&#127917;</span>
            <span>CinemaHub</span>
        </a>
        <nav class="auth-nav">
            <a th:href="@{/movies}">Phim</a>
            <a th:href="@{/bookings}">Vé của tôi</a>
            <form method="post" th:action="@{/logout}" th:if="${_csrf != null}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit">Đăng xuất</button>
            </form>
        </nav>
    </header>
    <main class="main-wrap">
        <div class="detail-card">
            <h1>Thông tin đặt vé</h1>
            <p class="row"><strong>Mã đặt vé:</strong> <span th:text="${booking.bookingId}">1</span></p>
            <p class="row"><strong>Phim:</strong> <span th:text="${booking.showtime.movie.title}">Tên phim</span></p>
            <p class="row"><strong>Rạp:</strong> <span th:text="${booking.showtime.room.branch.branchName}">Rạp</span></p>
            <p class="row"><strong>Phòng:</strong> <span th:text="${booking.showtime.room.roomName}">Phòng</span></p>
            <p class="row"><strong>Suất chiếu:</strong> <span th:text="${#temporals.format(booking.showtime.startTime, 'dd/MM/yyyy HH:mm')}">Ngày giờ</span></p>
            <p class="row"><strong>Ghế:</strong> <span th:text="${#lists.isEmpty(booking.bookingSeats)} ? '—' : #strings.listJoin(booking.bookingSeats.![seat.seatRow + seat.seatNumber], ', ')}">A1, A2</span></p>
            <p class="row"><strong>Tổng tiền:</strong> <span th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">0</span></p>
            <p class="row"><strong>Trạng thái:</strong> <span th:text="${booking.status.name() == 'paid' ? 'Đã thanh toán' : (booking.status.name() == 'pending' ? 'Chờ thanh toán' : 'Đã hủy')}">Trạng thái</span></p>
            <a th:href="@{/bookings}">← Quay lại danh sách vé</a>
        </div>
    </main>
</body>
</html>
