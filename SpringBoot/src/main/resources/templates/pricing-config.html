<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cấu hình ghế</title>

    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-seat-config.css}">
</head>

<body>

<div class="layout">

    <div th:replace="fragments/sidebar :: sidebar('branches')"></div>

    <main class="content">

        <header class="header">

            <h1>Quản lý rạp chiếu</h1>
            <p>Quản lý rạp, phòng chiếu và ghế ngồi</p>

            <div class="tabs">
                <a th:if="${!isManager}" th:href="@{|${branchBasePath}|}" class="tab">Rạp chiếu</a>
                <a th:href="@{|${roomBasePath}|}" class="tab">Phòng chiếu</a>
                <a th:href="@{|${pricingBasePath}|}" class="tab active">Cấu hình ghế</a>
            </div>

        </header>

        <form method="get" th:action="@{|${pricingBasePath}|}" class="branch-filter" th:if="${!isManager}">

            <label>Chi nhánh</label>

            <select name="branchId" onchange="this.form.submit()">

                <option th:each="b : ${branches}"
                        th:value="${b.branchId}"
                        th:text="${b.branchName}"
                        th:selected="${b.branchId == branchId}">
                </option>

            </select>

        </form>

        <div class="branch-filter" th:if="${isManager}">
            <label>Chi nhánh</label>
            <div class="filter-select" th:text="${branchName}">Chi nhánh</div>
        </div>

        <div th:if="${error}" class="alert-box alert-error" th:text="${error}"></div>
        <div th:if="${success}" class="alert-box alert-success" th:text="${success}"></div>
        <div id="priceValidationMessage" class="alert-box alert-error" style="display: none;"></div>

        <form id="pricingConfigForm" th:action="@{|${pricingBasePath}/update|}" method="post">

            <input type="hidden" name="branchId" th:value="${branchId}">

            <div class="seat-config-grid">

                <div class="seat-card normal-card">

                    <h3>Ghế thường</h3>

                    <input type="hidden"
                           name="pricings[0].seatType"
                           value="NORMAL">

                    <label>Giá vé</label>
                    <input type="number"
                           id="normalPrice"
                           min="0"
                           step="1000"
                           name="pricings[0].price"
                           th:value="${normalPrice}">

                    <p class="desc">
                        Ghế tiêu chuẩn, phù hợp cho đa số khách hàng
                    </p>

                </div>

                <div class="seat-card vip-card">

                    <h3>Ghế VIP</h3>

                    <input type="hidden"
                           name="pricings[1].seatType"
                           value="VIP">

                    <label>Giá vé</label>
                    <input type="number"
                           id="vipPrice"
                           min="0"
                           step="1000"
                           name="pricings[1].price"
                           th:value="${vipPrice}">

                    <p class="desc">
                        Ghế cao cấp, thoải mái hơn
                    </p>

                </div>

                <div class="seat-card couple-card">

                    <h3>Ghế đôi</h3>

                    <input type="hidden"
                           name="pricings[2].seatType"
                           value="COUPLE">

                    <label>Giá vé</label>
                    <input type="number"
                           id="couplePrice"
                           min="0"
                           step="1000"
                           name="pricings[2].price"
                           th:value="${couplePrice}">

                    <p class="desc">
                        Ghế đôi dành cho cặp đôi
                    </p>

                </div>

            </div>

            <button type="submit" class="btn-save">
                Lưu cấu hình
            </button>

        </form>

    </main>

</div>

<script>
    (function () {
        const form = document.getElementById("pricingConfigForm");
        const normalInput = document.getElementById("normalPrice");
        const vipInput = document.getElementById("vipPrice");
        const coupleInput = document.getElementById("couplePrice");
        const messageBox = document.getElementById("priceValidationMessage");

        if (!form || !normalInput || !vipInput || !coupleInput || !messageBox) {
            return;
        }

        function toNumber(value) {
            const n = Number(value);
            return Number.isFinite(n) ? n : 0;
        }

        function showError(message) {
            messageBox.textContent = message;
            messageBox.style.display = "block";
            normalInput.classList.toggle("input-invalid", toNumber(normalInput.value) > toNumber(vipInput.value) || toNumber(normalInput.value) > toNumber(coupleInput.value));
            vipInput.classList.toggle("input-invalid", toNumber(vipInput.value) > toNumber(coupleInput.value));
            coupleInput.classList.toggle("input-invalid", false);
        }

        function clearError() {
            messageBox.style.display = "none";
            messageBox.textContent = "";
            normalInput.classList.remove("input-invalid");
            vipInput.classList.remove("input-invalid");
            coupleInput.classList.remove("input-invalid");
        }

        function validateSeatPriceOrder() {
            const normal = toNumber(normalInput.value);
            const vip = toNumber(vipInput.value);
            const couple = toNumber(coupleInput.value);

            if (normal > vip) {
                showError("Giá ghế thường không thể lớn hơn giá ghế VIP.");
                return false;
            }
            if (normal > couple) {
                showError("Giá ghế thường không thể lớn hơn giá ghế đôi.");
                return false;
            }
            if (vip > couple) {
                showError("Giá ghế VIP không thể lớn hơn giá ghế đôi.");
                return false;
            }

            clearError();
            return true;
        }

        [normalInput, vipInput, coupleInput].forEach(input => {
            input.addEventListener("input", validateSeatPriceOrder);
        });

        form.addEventListener("submit", function (event) {
            if (!validateSeatPriceOrder()) {
                event.preventDefault();
            }
        });
    })();
</script>

</body>
</html>
