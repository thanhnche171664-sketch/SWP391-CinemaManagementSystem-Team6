<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý phim - Cinema System</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar('movies')}"></div>

    <main class="content">
        <div class="header">
            <div>
                <h1>Quản lý phim</h1>
                <p>Tạo mới, cập nhật và ẩn/hiện phim.</p>
            </div>
            <button type="button" onclick="openModalAdd()" class="btn-add">
                <i data-lucide="plus-circle"></i>
                Thêm phim
            </button>
        </div>

        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>
        <div th:if="${success}" class="alert alert-success">
            <span th:text="${success}"></span>
        </div>

        <div class="filters">
            <div class="search-box has-icon">
                <span class="search-icon">
                    <i data-lucide="search"></i>
                </span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm theo tiêu đề...">
            </div>

            <select id="statusFilter" onchange="filterTable()" class="filter-select">
                <option value="">Tất cả trạng thái</option>
                <option value="upcoming">upcoming</option>
                <option value="now_showing">now_showing</option>
                <option value="stopped">stopped</option>
            </select>

            <select id="hiddenFilter" onchange="filterTable()" class="filter-select">
                <option value="">Tất cả hiển thị</option>
                <option value="shown">Shown</option>
                <option value="hidden">Hidden</option>
            </select>
        </div>

        <div class="table-card">
            <table class="data-table" id="movieTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Poster</th>
                    <th>Tiêu đề</th>
                    <th>Thể loại</th>
                    <th>Thời lượng</th>
                    <th>Ngày phát hành</th>
                    <th>Tuổi</th>
                    <th>Trạng thái</th>
                    <th>Hiển thị</th>
                    <th class="text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="movie : ${movieList}">
                    <td class="mono text-muted" th:text="${movie.movieId}"></td>
                    <td>
                        <img th:if="${movie.posterUrl}" th:src="${movie.posterUrl}" class="poster-img" th:alt="${movie.title}">
                        <span th:if="${movie.posterUrl == null}" class="empty-poster">No image</span>
                    </td>
                    <td th:text="${movie.title}"></td>
                    <td class="text-muted" th:text="${movie.genreNames}"></td>
                    <td class="text-muted" th:text="${movie.duration} + ' phút'"></td>
                    <td class="text-muted"
                        th:text="${movie.releaseDate != null ? #temporals.format(movie.releaseDate, 'dd/MM/yyyy') : '-'}"></td>
                    <td class="text-muted" th:text="${movie.ageRating}"></td>
                    <td>
                        <span class="status-badge" th:classappend="' status-' + ${movie.status}"
                              th:text="${movie.status}"></span>
                    </td>
                    <td>
                        <a th:href="@{'/admin/movies/toggle/' + ${movie.movieId}}" class="visibility-link">
                            <span th:class="'visibility-dot ' + (${movie.hidden} ? 'dot-hidden' : 'dot-shown')"></span>
                            <span th:text="${movie.hidden ? 'Hidden' : 'Shown'}"
                                  th:class="'visibility-label ' + (${movie.hidden} ? 'text-muted' : 'text-success')"></span>
                        </a>
                    </td>
                    <td class="text-right">
                        <div class="action-buttons">
                            <button type="button" th:onclick="prepareEdit([[${movie}]])" class="icon-btn">
                                <i data-lucide="edit-3"></i>
                            </button>
                            <a th:href="@{'/movies/' + ${movie.movieId}}" class="icon-btn">
                                <i data-lucide="eye"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination" th:if="${totalPages > 1}">
            <a class="page-link"
               th:href="@{/admin/movies(page=${currentPage > 0 ? currentPage - 1 : 0}, size=${pageSize})}"
               th:classappend="${currentPage == 0} ? ' disabled' : ''">
                &laquo;
            </a>
            <a class="page-link"
               th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
               th:href="@{/admin/movies(page=${i}, size=${pageSize})}"
               th:classappend="${i == currentPage} ? ' active' : ''"
               th:text="${i + 1}">
                1
            </a>
            <a class="page-link"
               th:href="@{/admin/movies(page=${currentPage + 1 < totalPages ? currentPage + 1 : totalPages - 1}, size=${pageSize})}"
               th:classappend="${currentPage + 1 >= totalPages} ? ' disabled' : ''">
                &raquo;
            </a>
        </div>
    </main>
</div>

<div id="movieModal" class="modal-backdrop hidden">
    <div class="modal">
        <h2 id="modalTitle" class="modal-title">Thêm phim mới</h2>
        <form th:action="@{/admin/movies/save}" th:object="${newMovie}" method="POST" id="movieForm">
            <input type="hidden" th:field="*{movieId}" id="form-id">
            <div class="form-grid">
                <div class="form-group full">
                    <label class="form-label">Tiêu đề phim</label>
                    <input type="text"
                           th:field="*{title}"
                           id="form-title"
                           required
                           maxlength="255"
                           class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Thể loại</label>
                    <select multiple th:field="*{genreIds}" id="form-genres" class="form-select" required>
                        <option th:each="g : ${genreList}" th:value="${g.genreId}" th:text="${g.genreName}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Thời lượng (phút)</label>
                    <input type="number" min="30" max="300" step="1" th:field="*{duration}" id="form-duration" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Ngày phát hành</label>
                    <input type="date" th:field="*{releaseDate}" id="form-releaseDate" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Độ tuổi</label>
                    <select th:field="*{ageRating}" id="form-ageRating" class="form-select" required>
                        <option value="" disabled selected>Chọn độ tuổi</option>
                        <option value="G">G</option>
                        <option value="PG">PG</option>
                        <option value="PG-13">PG-13</option>
                        <option value="C13">C13</option>
                        <option value="C16">C16</option>
                        <option value="C18">C18</option>
                        <option value="P">P</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Trạng thái</label>
                    <select th:field="*{status}" id="form-status" class="form-select">
                        <option value="upcoming">upcoming</option>
                        <option value="now_showing">now_showing</option>
                        <option value="stopped">stopped</option>
                    </select>
                </div>
                <div class="form-group full">
                    <label class="form-label">Poster URL</label>
                    <input type="url" th:field="*{posterUrl}" id="form-posterUrl" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group full">
                    <label class="form-label">Trailer URL</label>
                    <input type="url" th:field="*{trailerUrl}" id="form-trailerUrl" class="form-input" placeholder="https://...">
                </div>
                <div class="form-group full">
                    <label class="form-label">Mô tả</label>
                    <textarea rows="4" th:field="*{description}" id="form-description" class="form-textarea" maxlength="2000"></textarea>
                </div>
            </div>
            <div class="modal-actions">
                <button type="button" onclick="closeModal()" class="btn-secondary">Hủy</button>
                <button type="submit" class="btn-primary">Lưu dữ liệu</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    const form = document.getElementById('movieForm');
    const titleInput = document.getElementById('form-title');
    const durationInput = document.getElementById('form-duration');
    const releaseDateInput = document.getElementById('form-releaseDate');
    const ageRatingInput = document.getElementById('form-ageRating');
    const genreSelect = document.getElementById('form-genres');
    const descriptionInput = document.getElementById('form-description');
    let isEditMode = false;

    function setTodayMinDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        releaseDateInput.min = `${yyyy}-${mm}-${dd}`;
    }

    function clearReleaseDateMin() {
        releaseDateInput.removeAttribute('min');
    }

    function updateValidity() {
        const titleValue = (titleInput.value || '').trim();
        if (titleValue.length === 0) {
            titleInput.setCustomValidity('Tên phim không được để trống hoặc chỉ toàn khoảng trắng.');
        } else if (titleValue.length > 255) {
            titleInput.setCustomValidity('Tên phim tối đa 255 ký tự.');
        } else {
            titleInput.setCustomValidity('');
        }

        const durationValue = durationInput.value;
        const durationNumber = Number(durationValue);
        if (!durationValue) {
            durationInput.setCustomValidity('Thời lượng phim là bắt buộc.');
        } else if (!Number.isInteger(durationNumber) || durationNumber < 30 || durationNumber > 300) {
            durationInput.setCustomValidity('Thời lượng phải là số nguyên từ 30 đến 300 phút.');
        } else {
            durationInput.setCustomValidity('');
        }

        if (!releaseDateInput.value) {
            releaseDateInput.setCustomValidity('Ngày phát hành là bắt buộc.');
        } else if (!isEditMode && releaseDateInput.min && releaseDateInput.value < releaseDateInput.min) {
            releaseDateInput.setCustomValidity('Ngày phát hành không được nhỏ hơn ngày hiện tại.');
        } else {
            releaseDateInput.setCustomValidity('');
        }

        if (!ageRatingInput.value) {
            ageRatingInput.setCustomValidity('Vui lòng chọn độ tuổi hợp lệ.');
        } else {
            ageRatingInput.setCustomValidity('');
        }

        if (genreSelect.selectedOptions.length === 0) {
            genreSelect.setCustomValidity('Vui lòng chọn ít nhất một thể loại.');
        } else {
            genreSelect.setCustomValidity('');
        }

        if ((descriptionInput.value || '').length > 2000) {
            descriptionInput.setCustomValidity('Mô tả tối đa 2000 ký tự.');
        } else {
            descriptionInput.setCustomValidity('');
        }
    }

    titleInput.addEventListener('input', updateValidity);
    durationInput.addEventListener('input', updateValidity);
    releaseDateInput.addEventListener('input', updateValidity);
    ageRatingInput.addEventListener('change', updateValidity);
    genreSelect.addEventListener('change', updateValidity);
    descriptionInput.addEventListener('input', updateValidity);

    form.addEventListener('submit', (event) => {
        updateValidity();
        if (!form.checkValidity()) {
            event.preventDefault();
            form.reportValidity();
        }
    });

    setTodayMinDate();

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const statusValue = document.getElementById('statusFilter').value;
        const hiddenValue = document.getElementById('hiddenFilter').value;
        const rows = document.querySelectorAll('tbody tr');

        rows.forEach(row => {
            const title = row.cells[2].innerText.toLowerCase();
            const status = row.cells[7].innerText.trim().toLowerCase();
            const visibility = row.cells[8].innerText.trim().toLowerCase();

            const matchesSearch = title.includes(searchText);
            const matchesStatus = statusValue === "" || status === statusValue;
            const matchesHidden = hiddenValue === "" || visibility === hiddenValue;

            row.style.display = (matchesSearch && matchesStatus && matchesHidden) ? "" : "none";
        });
    }

    function openModalAdd() {
        isEditMode = false;
        document.getElementById('modalTitle').innerText = "Thêm phim mới";
        document.getElementById('movieForm').reset();
        document.getElementById('form-id').value = "";
        Array.from(genreSelect.options).forEach(option => {
            option.selected = false;
        });
        setTodayMinDate();
        updateValidity();
        document.getElementById('movieModal').classList.remove('hidden');
    }

    function prepareEdit(movie) {
        isEditMode = true;
        document.getElementById('modalTitle').innerText = "Cập nhật phim";
        document.getElementById('form-id').value = movie.movieId;
        document.getElementById('form-title').value = movie.title || "";
        const genreSelect = document.getElementById('form-genres');
        const selectedIds = (movie.genreIds || []).map(String);
        Array.from(genreSelect.options).forEach(option => {
            option.selected = selectedIds.includes(option.value);
        });
        document.getElementById('form-duration').value = movie.duration || "";
        document.getElementById('form-releaseDate').value = movie.releaseDate || "";
        document.getElementById('form-ageRating').value = movie.ageRating || "";
        document.getElementById('form-status').value = movie.status || "upcoming";
        document.getElementById('form-posterUrl').value = movie.posterUrl || "";
        document.getElementById('form-trailerUrl').value = movie.trailerUrl || "";
        document.getElementById('form-description').value = movie.description || "";
        clearReleaseDateMin();
        updateValidity();
        document.getElementById('movieModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('movieModal').classList.add('hidden');
    }

    window.onclick = function(event) {
        const modal = document.getElementById('movieModal');
        if (event.target == modal) {
            closeModal();
        }
    }
</script>
</body>
</html>
