<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt lại mật khẩu - CinemaHub</title>
    <link rel="stylesheet" th:href="@{/styles/auth.css}">
</head>
<body class="auth-page">
    <header class="auth-header">
        <a th:href="@{/login}" class="auth-logo">
            <span class="auth-logo-icon">🎬</span>
            <span>CinemaHub</span>
        </a>
        <nav class="auth-nav">
            <a th:href="@{/login}">Đăng nhập</a>
        </nav>
    </header>
    <main class="auth-main">
        <div class="auth-main-inner">
            <div class="auth-card">
                <h1>Đặt lại mật khẩu</h1>
                <p class="subtitle">Nhập mật khẩu mới cho tài khoản của bạn</p>
                <div th:if="${error}" class="auth-alert danger" th:text="${error}">Error</div>
                <form th:action="@{/reset-password}" method="post" class="auth-form">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                    <input type="hidden" name="token" th:value="${token}"/>
                    <div class="form-group">
                        <label for="password">Mật khẩu mới</label>
                        <input type="password" id="password" name="password" required minlength="6" placeholder="Ít nhất 6 ký tự" autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label for="passwordConfirm">Xác nhận mật khẩu</label>
                        <input type="password" id="passwordConfirm" name="passwordConfirm" required minlength="6" placeholder="Nhập lại mật khẩu" autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-submit">Đặt lại mật khẩu</button>
                </form>
                <div class="auth-footer">
                    <p><a th:href="@{/login}">← Quay lại đăng nhập</a></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
