<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý rạp chiếu</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-room.css}">
</head>
<body>

    <div class="layout">
        <div th:replace="fragments/sidebar :: sidebar('branches')"></div>

        <main class="content">

            <header class="header">
                <div>
                    <a th:href="@{/rooms}" style="display: inline-flex; align-items: center; gap: 6px; margin-bottom: 8px; color: #86efac; text-decoration: none; font-size: 14px;">← Quay lại</a>
                    <h1>Quản lý phòng chiếu và ghế ngồi</h1>
                </div>
            </header>
            <div class="cinema">

                <div class="seat-map">

                    <div th:each="row : ${#lists.sort(#sets.toSet(seats.![seatRow]))}"
                         class="seat-row">

                        <div class="row-label" th:text="${row}">A</div>

                        <div th:each="seat : ${seats}"
                             th:if="${seat.seatRow == row}"
                             class="seat"
                             th:attr="data-id=${seat.seatId}"
                             th:classappend="
                            ${seat.seatType.name() == 'VIP'} ? 'seat-vip' :
                            (${seat.seatType.name() == 'COUPLE'} ? 'seat-couple' : 'seat-normal')
                         ">

                            <img th:src="@{/images/armchair.png}"
                                 class="seat-icon"
                                 alt="seat">

                        </div>
                    </div>

                </div>

                <div id="seatModal" class="modal">
                    <div class="modal-content">
                        <h3>Chọn loại ghế</h3>

                        <select id="seatTypeSelect">
                            <option value="NORMAL">Ghế thường</option>
                            <option value="VIP">Ghế VIP</option>
                            <option value="COUPLE">Ghế đôi</option>
                        </select>

                        <div class="modal-actions">
                            <button id="saveSeat" class="btn-confirm">Lưu</button>
                            <button id="closeModal" class="btn-cancel">Huỷ</button>
                        </div>
                    </div>
                </div>

                <div class="legend">
                    <div><span class="seat seat-normal"></span> Ghế thường</div>
                    <div><span class="seat seat-vip"></span> Ghế VIP</div>
                    <div><span class="seat seat-couple"></span> Ghế đôi</div>
                </div>

            </div>
        </main>
    </div>
</body>
<script>
    let selectedSeatId = null;

    // click ghế
    document.querySelectorAll(".seat").forEach(seat => {
        seat.addEventListener("click", function () {

            // highlight ghế đang chọn
            document.querySelectorAll(".seat").forEach(s => s.classList.remove("active"));
            this.classList.add("active");

            selectedSeatId = this.dataset.id;

            document.getElementById("seatModal").style.display = "flex";
        });
    });

    // đóng modal
    document.getElementById("closeModal").onclick = () => {
        document.getElementById("seatModal").style.display = "none";
    };

    // lưu loại ghế
    document.getElementById("saveSeat").onclick = () => {

        const type = document.getElementById("seatTypeSelect").value;

        fetch("/admin/seats/update-type", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                seatId: selectedSeatId,
                type: type
            })
        })
            .then(res => {
                if (res.ok) {
                    location.reload(); // reload để update màu
                } else {
                    alert("Lỗi cập nhật ghế!");
                }
            });
    };
</script>
</html>
