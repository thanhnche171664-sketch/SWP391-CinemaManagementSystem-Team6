<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý rạp chiếu</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-room.css}">
</head>
<body>

    <div class="layout">
        <div th:replace="fragments/sidebar :: sidebar('branches')"></div>

        <main class="content">

            <header class="header">
                <div>
                    <a th:href="@{|${roomBasePath}|}" class="btn-back">← Quay lại</a>
                    <h1>Quản lý phòng chiếu và ghế ngồi</h1>
                </div>
            </header>
            <div class="cinema">

                <div class="seat-map">

                    <div th:each="row : ${#lists.sort(#sets.toSet(seats.![seatRow]))}"
                         class="seat-row">

                        <div class="row-label" th:text="${row}">A</div>

                        <div th:each="seat : ${seats}"
                             th:if="${seat.seatRow == row}"
                             class="seat"
                             th:attr="data-id=${seat.seatId},data-type=${seat.seatType}"
                             th:classappend="
                            ${seat.seatType.name() == 'VIP'} ? 'seat-vip' :
                            (${seat.seatType.name() == 'COUPLE'} ? 'seat-couple' : 'seat-normal')
                         ">

                            <img th:src="@{/images/armchair.png}"
                                 class="seat-icon"
                                 alt="seat">

                        </div>
                    </div>

                </div>

                <div id="seatModal" class="modal">
                    <div class="modal-content">
                        <h3>Chọn loại ghế</h3>
                        <p class="modal-subtitle">Cập nhật loại ghế cho vị trí đang chọn.</p>

                        <div class="seat-type-grid">
                            <label class="seat-type-option">
                                <input type="radio" name="seatType" value="NORMAL" checked>
                                <span class="seat-type-icon seat-normal"></span>
                                <span class="seat-type-label">Ghế thường</span>
                            </label>
                            <label class="seat-type-option">
                                <input type="radio" name="seatType" value="VIP">
                                <span class="seat-type-icon seat-vip"></span>
                                <span class="seat-type-label">Ghế VIP</span>
                            </label>
                            <label class="seat-type-option">
                                <input type="radio" name="seatType" value="COUPLE">
                                <span class="seat-type-icon seat-couple"></span>
                                <span class="seat-type-label">Ghế đôi</span>
                            </label>
                        </div>

                        <div class="modal-actions">
                            <button id="saveSeat" class="btn-confirm">Lưu</button>
                            <button id="closeModal" class="btn-cancel">Huỷ</button>
                        </div>
                    </div>
                </div>

                <div class="legend">
                    <div><span class="seat seat-normal"></span> Ghế thường</div>
                    <div><span class="seat seat-vip"></span> Ghế VIP</div>
                    <div><span class="seat seat-couple"></span> Ghế đôi</div>
                </div>

            </div>
        </main>
    </div>
</body>
<script th:inline="javascript">
    const seatUpdateUrl = /*[[${seatUpdatePath}]]*/ '/admin/seats/update-type';
    let selectedSeatId = null;
    const typeInputs = Array.from(document.querySelectorAll('input[name="seatType"]'));

    function syncActiveType() {
        typeInputs.forEach(input => {
            const option = input.closest('.seat-type-option');
            if (option) {
                option.classList.toggle('active', input.checked);
            }
        });
    }

    // click ghế
    document.querySelectorAll(".seat").forEach(seat => {
        seat.addEventListener("click", function () {

            // highlight ghế đang chọn
            document.querySelectorAll(".seat").forEach(s => s.classList.remove("active"));
            this.classList.add("active");

            selectedSeatId = this.dataset.id;
            const currentType = this.dataset.type || 'NORMAL';
            const match = typeInputs.find(input => input.value === currentType);
            if (match) {
                match.checked = true;
            }
            syncActiveType();

            document.getElementById("seatModal").style.display = "flex";
        });
    });

    // đóng modal
    document.getElementById("closeModal").onclick = () => {
        document.getElementById("seatModal").style.display = "none";
    };

    typeInputs.forEach(input => {
        input.addEventListener('change', syncActiveType);
    });
    syncActiveType();

    // lưu loại ghế
    document.getElementById("saveSeat").onclick = () => {
        const selected = typeInputs.find(input => input.checked);
        const type = selected ? selected.value : 'NORMAL';

        fetch(seatUpdateUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                seatId: selectedSeatId,
                type: type
            })
        })
            .then(res => {
                if (res.ok) {
                    location.reload(); // reload để update màu
                } else {
                    alert("Lỗi cập nhật ghế!");
                }
            });
    };
</script>
</html>
