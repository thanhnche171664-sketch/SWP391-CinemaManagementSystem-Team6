<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar(active)"
     class="sidebar">

    <div class="sidebar-top">
        <h2 class="logo">Admin</h2>

        <details class="admin-user-menu" th:if="${user != null}">
            <summary class="admin-user-trigger">
                <span class="admin-user-name-short"
                      th:text="${user.fullName != null && !#strings.isEmpty(user.fullName) ? user.fullName : 'Admin'}">Admin</span>
                <span class="admin-user-caret">▾</span>
            </summary>

            <div class="admin-user-dropdown">
                <a th:href="@{/auth/logout}" class="admin-user-link logout-link">Đăng xuất</a>
            </div>
        </details>
    </div>

    <nav>
        <a th:classappend="${active == 'dashboard'} ? 'active'"
           href="#">Tổng quan</a>

        <a th:classappend="${active == 'movies'} ? 'active'"
           th:href="@{/admin/movies}">Quản lý phim</a>

        <a th:classappend="${active == 'genres'} ? 'active'"
           th:href="@{/admin/genres}">Quản lý thể loại</a>

        <a th:classappend="${active == 'branches'} ? 'active'"
           th:href="@{/branches}">Quản lý rạp</a>

        <a th:classappend="${active == 'staff'} ? 'active'"
           th:href="@{/admin/staff}">Quản lý nhân viên</a>

        <a th:classappend="${active == 'customers'} ? 'active'"
           th:href="@{/admin/customers}">Quản lý khách hàng</a>

        <a th:classappend="${active == 'shows'} ? 'active'"
           href="#">Quản lý suất chiếu</a>

        <a th:classappend="${active == 'tickets'} ? 'active'"
           th:href="@{/admin/bookings}">Quản lý đặt vé</a>

        <a th:classappend="${active == 'news'} ? 'active'"
           th:href="@{/admin/news}">Quản lý tin tức</a>

        <a th:classappend="${active == 'promotions'} ? 'active'"
           th:href="@{/admin/promotions/view}">Quản lý khuyến mãi</a>

        <a th:classappend="${active == 'reports'} ? 'active'"
           th:href="@{/admin/reports}">Báo cáo & Thống kê</a>
    </nav>

</div>

</body>
</html>
