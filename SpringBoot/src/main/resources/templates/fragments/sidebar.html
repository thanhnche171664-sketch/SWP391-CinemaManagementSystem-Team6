<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar(active)"
     class="sidebar">

    <div class="sidebar-top">
        <h2 class="logo" th:text="${user != null and user.role != null and user.role.name() == 'MANAGER' ? 'Manager' : 'Admin'}">Admin</h2>
    </div>

    <nav>
        <a th:classappend="${active == 'dashboard'} ? 'active'"
           th:href="${user != null and user.role != null and user.role.name() == 'MANAGER' ? '/manager/dashboard' : '/admin'}">Tổng quan</a>

        <a th:classappend="${active == 'movies'} ? 'active'"
           th:href="${user != null and user.role != null and user.role.name() == 'MANAGER' ? '/manager/movies' : '/admin/movies'}">Quản lý phim</a>

        <a th:classappend="${active == 'genres'} ? 'active'"
           th:if="${user == null or user.role == null or user.role.name() != 'MANAGER'}"
           th:href="@{/admin/genres}">Quản lý thể loại</a>

        <a th:classappend="${active == 'branches'} ? 'active'"
           th:href="${user != null and user.role != null and user.role.name() == 'MANAGER' ? '/manager/rooms' : '/branches'}">Quản lý rạp</a>

        <a th:classappend="${active == 'staff'} ? 'active'"
           th:if="${user == null or user.role == null or user.role.name() != 'MANAGER'}"
           th:href="@{/admin/staff}">Quản lý nhân viên</a>

        <a th:classappend="${active == 'customers'} ? 'active'"
           th:if="${user == null or user.role == null or user.role.name() != 'MANAGER'}"
           th:href="@{/admin/customers}">Quản lý khách hàng</a>

        <a th:classappend="${active == 'showtimes'} ? 'active'"
           th:href="${user != null and user.role != null and user.role.name() == 'MANAGER' ? '/manager/showtimes' : '/admin/showtimes'}">Quản lý suất chiếu</a>



        <a th:classappend="${active == 'tickets'} ? 'active'"
           th:href="@{/admin/bookings}">Quản lý đặt vé</a>

        <a th:classappend="${active == 'news'} ? 'active'"
           th:href="${user != null and user.role != null and user.role.name() == 'MANAGER' ? '/manager/news' : '/admin/news'}">Quản lý tin tức</a>

        <a th:classappend="${active == 'promotions'} ? 'active'"
           th:href="${user != null and user.role != null and user.role.name() == 'MANAGER' ? '/manager/promotions/view' : '/admin/promotions/view'}">Quản lý khuyến mãi</a>

        <a th:classappend="${active == 'reviews'} ? 'active'"
           th:if="${user == null or user.role == null or user.role.name() != 'MANAGER'}"
           th:href="@{/admin/reviews}">Quản lý đánh giá</a>

        <a th:classappend="${active == 'reports'} ? 'active'"
           th:href="@{/admin/reports}">Báo cáo & Thống kê</a>
    </nav>

    <div class="sidebar-bottom" th:if="${user != null}">
        <details class="admin-user-menu">
            <summary class="admin-user-trigger">
                <span class="admin-user-name-short"
                      th:text="${user.fullName != null && !#strings.isEmpty(user.fullName) ? user.fullName : 'Admin'}">Admin</span>
                <span class="admin-user-caret">▾</span>
            </summary>

            <div class="admin-user-dropdown">
                <a th:href="@{/auth/logout}" class="admin-user-link logout-link">Đăng xuất</a>
            </div>
        </details>
    </div>

</div>

</body>
</html>
