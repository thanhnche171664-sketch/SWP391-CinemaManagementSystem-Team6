<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="staffNav(activePage)" class="staff-top-nav">
  <div class="staff-nav-links">
    <a href="/staff/booking/pos"
       class="staff-nav-link"
       th:classappend="${activePage == 'pos'} ? ' active' : ''">Đặt vé POS</a>

    <a href="/staff/booking/manage"
       class="staff-nav-link"
       th:classappend="${activePage == 'manage'} ? ' active' : ''">Danh sách vé</a>

    <a href="/staff/profile"
       class="staff-nav-link"
       th:classappend="${activePage == 'profile'} ? ' active' : ''">Hồ sơ cá nhân</a>
  </div>

  <div class="staff-nav-right">
    <div class="staff-user-pill">
      ID: <span th:text="${session.loggedInUser?.userId}">#000</span>
    </div>
    <a href="/auth/logout" class="staff-logout-link">Đăng xuất</a>
  </div>
</nav>

</body>
</html>
