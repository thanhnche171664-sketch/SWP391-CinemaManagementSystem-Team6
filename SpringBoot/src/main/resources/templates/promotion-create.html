<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm khuyến mãi mới</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-promotion.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar('promotions')"></div>

    <main class="content">
        <div class="form-container-modal">
            <div class="modal-header">
                <h2>Thêm khuyến mãi mới</h2>
                <a th:href="@{|${promotionBasePath}/view|}" class="btn-close" style="text-decoration: none;">&times;</a>
            </div>

            <div th:if="${error}" class="alert alert-danger"
                 style="background-color: #ef4444; color: white; padding: 1rem; border-radius: 0.5rem; margin-bottom: 1.5rem;">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{|${promotionBasePath}/create-action|}" method="post" class="promotion-form">

                <div class="form-row">
                    <div class="form-group">
                        <label>Mã code <span class="text-red">*</span></label>
                        <input type="text" name="promoCode" placeholder="VD: WELCOME10" required>
                    </div>
                    <div class="form-group">
                        <label>Tên khuyến mãi <span class="text-red">*</span></label>
                        <input type="text" name="description" placeholder="VD: Giảm giá chào mừng" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Mô tả chi tiết</label>
                    <textarea name="detailedDescription" placeholder="Mô tả chi tiết về khuyến mãi"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Loại khuyến mãi</label>
                        <select name="discountType">
                            <option value="percent">Giảm theo phần trăm (%)</option>
                            <option value="amount">Giảm theo số tiền (VNĐ)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Giá trị</label>
                        <input type="number" step="0.01" name="discountValue" placeholder="VD: 10" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Đơn hàng tối thiểu (VNĐ)</label>
                        <input type="number" step="0.01" name="minBookingAmount" placeholder="VD: 100000">
                    </div>
                    <div class="form-group">
                        <label>Giới hạn số lần sử dụng</label>
                        <input type="number" name="usageLimit"
                               th:value="${promotion.usageLimit}"
                               min="0"
                               required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày bắt đầu <span class="text-red">*</span></label>
                        <input type="datetime-local" name="startDate" th:value="${promotion.startDate}" required>
                    </div>
                    <div class="form-group">
                        <label>Ngày kết thúc <span class="text-red">*</span></label>
                        <input type="datetime-local" name="endDate" th:value="${promotion.endDate}" required>
                    </div>
                </div>

                <div class="form-actions-modal">
                    <a th:href="@{|${promotionBasePath}/view|}" class="btn-cancel" style="text-decoration: none;">Hủy</a>
                    <button type="submit" class="btn-submit">Thêm mới</button>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
