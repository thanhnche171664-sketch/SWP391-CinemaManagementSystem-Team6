<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách rạp - CinemaHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="cinemas-page">
    <div th:replace="~{fragments/public-header :: publicHeader}"></div>

    <section class="cinemas-hero">
        <div class="container">
            <div class="text-center mb-4">
                <h1><i class="bi bi-building"></i> Chọn rạp gần bạn</h1>
                <p class="lead">Tìm rạp chiếu phim gần nhất và đặt vé ngay</p>
            </div>
            <div class="cinemas-search">
                <form th:action="@{/cinemas}" method="get" class="d-flex gap-2">
                    <input type="text"
                           name="keyword"
                           class="form-control cinemas-search-input"
                           placeholder="Tìm kiếm rạp theo tên hoặc thành phố..."
                           th:value="${keyword}">
                    <button type="submit" class="btn cinemas-search-btn">
                        <i class="bi bi-search"></i>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <div class="container pb-5">
        <div class="row" id="cinemaList">
            <div class="col-md-6 col-lg-4" th:each="branch : ${branches}">
                <div class="cinemas-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h3 th:text="${branch.branchName}">Tên rạp</h3>
                            <p class="cinemas-address mb-1">
                                <i class="bi bi-geo-alt"></i>
                                <span th:text="${branch.address}">Địa chỉ</span>
                            </p>
                            <span class="cinemas-city-badge">
                                <i class="bi bi-map"></i>
                                <span th:text="${branch.city}">Thành phố</span>
                            </span>
                        </div>
                    </div>
                    <hr>
                    <a th:href="@{/movies(branch=${branch.branchId})}"
                       class="btn cinemas-btn-primary w-100">
                        <i class="bi bi-ticket-perforated"></i> Xem phim tại rạp này
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(branches)}" class="text-center py-5 cinemas-empty">
            <i class="bi bi-building display-1"></i>
            <h4 class="mt-3">Không tìm thấy rạp nào</h4>
            <p>Thử tìm kiếm với từ khóa khác</p>
            <a th:href="@{/cinemas}" class="btn cinemas-btn-secondary">Xem tất cả rạp</a>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2026 Cinema Management System - Team 6. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
