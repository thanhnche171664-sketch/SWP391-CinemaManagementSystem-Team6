<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách rạp - CinemaHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .cinema-hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 0 40px;
            margin-bottom: 40px;
        }
        .cinema-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .cinema-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            border-color: #667eea;
        }
        .cinema-card h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.25rem;
        }
        .cinema-card .address {
            color: #666;
            margin-bottom: 4px;
        }
        .cinema-card .city-badge {
            background: #f0f0f0;
            color: #666;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .search-section {
            max-width: 600px;
            margin: 0 auto;
        }
        .search-input-large {
            padding: 16px 24px;
            border-radius: 50px;
            border: none;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/public-header :: publicHeader}"></div>

    <section class="cinema-hero">
        <div class="container">
            <div class="text-center mb-4">
                <h1><i class="bi bi-building"></i> Chọn rạp gần bạn</h1>
                <p class="lead">Tìm rạp chiếu phim gần nhất và đặt vé ngay</p>
            </div>
            <div class="search-section">
                <form th:action="@{/cinemas}" method="get" class="d-flex gap-2">
                    <input type="text"
                           name="keyword"
                           class="form-control search-input-large"
                           placeholder="Tìm kiếm rạp theo tên hoặc thành phố..."
                           th:value="${keyword}">
                    <button type="submit" class="btn btn-light btn-lg px-4">
                        <i class="bi bi-search"></i>
                    </button>
                </form>
            </div>
        </div>
    </section>

    <div class="container pb-5">
        <div class="row" id="cinemaList">
            <div class="col-md-6 col-lg-4" th:each="branch : ${branches}">
                <div class="cinema-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <h3 th:text="${branch.branchName}">Tên rạp</h3>
                            <p class="address mb-1">
                                <i class="bi bi-geo-alt"></i>
                                <span th:text="${branch.address}">Địa chỉ</span>
                            </p>
                            <span class="city-badge">
                                <i class="bi bi-map"></i>
                                <span th:text="${branch.city}">Thành phố</span>
                            </span>
                        </div>
                    </div>
                    <hr>
                    <a th:href="@{/movies(branch=${branch.branchId})}"
                       class="btn btn-primary w-100">
                        <i class="bi bi-ticket-perforated"></i> Xem phim tại rạp này
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(branches)}" class="text-center py-5">
            <i class="bi bi-building display-1 text-muted"></i>
            <h4 class="mt-3 text-muted">Không tìm thấy rạp nào</h4>
            <p class="text-muted">Thử tìm kiếm với từ khóa khác</p>
            <a th:href="@{/cinemas}" class="btn btn-outline-primary">Xem tất cả rạp</a>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2026 Cinema Management System - Team 6. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
