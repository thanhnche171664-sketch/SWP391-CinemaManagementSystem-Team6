<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khuyến mãi</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-promotion.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .pagination {
            list-style: none;
            padding-left: 0;
        }
        .page-link{ color: #1f5aa6; }
        .page-item.active .page-link { background: #1f5aa6; border-color: #1f5aa6; color: white }
    </style>
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar('promotions')"></div>

    <main class="content">
        <div class="flex-between mb-8">
            <div>
                <h1>Quản lý Khuyến mãi</h1>
                <p class="text-gray-400">Quản lý mã giảm giá và chương trình khuyến mãi hệ thống</p>
            </div>
            <div class="flex-gap">
                <a th:href="@{|${promotionBasePath}/view|}" class="btn-dark" style="text-decoration: none;">
                    <i class="fas fa-sync-alt"></i> Làm mới
                </a>
            </div>
        </div>

        <div class="grid-4 mb-8">
            <div class="stat-card">
                <div><p class="stat-label">Tổng khuyến mãi</p><p class="stat-number" th:text="${totalPromotions}">0</p></div>
                <i class="fas fa-tag stat-icon"></i>
            </div>
            <div class="stat-card">
                <div><p class="stat-label">Đang hoạt động</p><p class="stat-number text-green" th:text="${activeCount}">0</p></div>
                <i class="fas fa-chart-line stat-icon text-green"></i>
            </div>
            <div class="stat-card">
                <div><p class="stat-label">Tạm dừng</p><p class="stat-number text-blue" th:text="${inactiveCount}">1</p></div>
                <i class="far fa-calendar-alt stat-icon text-blue"></i>
            </div>
        </div>

        <div class="filter-action-bar mb-8" style="display: flex; gap: 1rem; align-items: center;">
            <form th:action="@{|${promotionBasePath}/view|}" method="get" class="filter-action-bar mb-8">
                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm kiếm...">
                </div>

                <div class="filter-status-wrapper">
                    <i class="fas fa-filter"></i>
                    <select name="status">
                        <option value="">Tất cả trạng thái</option>
                        <option value="active" th:selected="${status == 'active'}">Đang hoạt động</option>
                        <option value="inactive" th:selected="${status == 'inactive'}">Tạm dừng</option>
                    </select>
                </div>

                <div class="filter-status-wrapper">
                    <i class="fas fa-percent"></i>
                    <select name="discountType">
                        <option value="">Tất cả loại giảm</option>
                        <option value="percent" th:selected="${discountType == 'percent'}">Theo %</option>
                        <option value="amount" th:selected="${discountType == 'amount'}">Giảm số tiền</option>
                    </select>
                </div>

                <div class="filter-status-wrapper">
                    <i class="fas fa-clock"></i>
                    <select name="timeFilter">
                        <option value="">Tất cả thời gian</option>
                        <option value="upcoming" th:selected="${timeFilter == 'upcoming'}">Sắp diễn ra</option>
                        <option value="ongoing" th:selected="${timeFilter == 'ongoing'}">Đang diễn ra</option>
                        <option value="expired" th:selected="${timeFilter == 'expired'}">Đã hết hạn</option>
                    </select>
                </div>

                <button type="submit" class="btn-dark">Tìm kiếm</button>
            </form>

            <a th:href="@{|${promotionBasePath}/create|}" class="btn-white" style="text-decoration: none; white-space: nowrap;">
                <i class="fas fa-plus mr-2"></i> Thêm khuyến mãi
            </a>
        </div>

        <div class="card-dark">
            <table>
                <thead>
                <tr class="table-header">
                    <th>Mã code</th>
                    <th>Tên khuyến mãi</th>
                    <th>Loại/Giá trị</th>
                    <th>Thời gian</th>
                    <th>Trạng thái</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="promo : ${promotions}">
                    <td class="font-bold"><i class="fas fa-tag mr-2 opacity-50"></i><span th:text="${promo.promoCode}"></span></td>
                    <td th:text="${promo.description}"></td>
                    <td th:text="${promo.discountType.name() == 'percent' ? promo.discountValue + '%' : #numbers.formatDecimal(promo.discountValue, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                    <td class="text-xs text-gray-400">
                        <span th:text="${#temporals.format(promo.startDate, 'dd/MM/yyyy')}"></span> - <span th:text="${#temporals.format(promo.endDate, 'dd/MM/yyyy')}"></span>
                    </td>
                    <td>
                        <span th:if="${promo.status.name() == 'active'}" class="status-badge badge-active">ĐANG HOẠT ĐỘNG</span>
                        <span th:if="${promo.status.name() == 'inactive'}" class="status-badge badge-inactive">TẠM DỪNG</span>
                    </td>
                    <td>
                        <div class="flex-gap">
                            <a th:if="${promo.status.name() == 'active'}" th:href="@{|${promotionBasePath}/edit/${promo.promotionId}|}" class="btn-icon"><i class="fas fa-edit"></i></a>
                            <a th:if="${promo.status.name() == 'active'}" th:href="@{|${promotionBasePath}/delete/${promo.promotionId}|}"
                               class="btn-icon text-red"
                               onclick="return confirm('Bạn có chắc chắn muốn tạm dừng mã khuyến mãi này?')">
                                <i class="fas fa-trash-alt"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <nav class="mt-4" th:if="${promotionPage.totalPages > 0}">
                <ul class="pagination justify-content-center">
                    <li class="page-item"
                        th:classappend="${promotionPage.first} ? ' disabled'">

                        <a class="page-link"
                           th:if="${!promotionPage.first}"
                           th:href="@{/admin/promotions/view(page=${promotionPage.number-1}, status=${status}, keyword=${keyword}, discountType=${discountType}, timeFilter=${timeFilter})}">
                            Trước
                        </a>

                        <span class="page-link" th:if="${promotionPage.first}">Trước</span>
                    </li>
                    <li class="page-item" th:each="i : ${#numbers.sequence(0, promotionPage.totalPages - 1)}" th:classappend="${i == promotionPage.number} ? 'active'">
                        <a class="page-link" th:href="@{/admin/promotions/view(page=${i}, status=${status}, keyword=${keyword}, discountType=${discountType}, timeFilter=${timeFilter})}" th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item"
                        th:classappend="${promotionPage.last} ? ' disabled'">

                        <a class="page-link"
                           th:if="${!promotionPage.last}"
                           th:href="@{/admin/promotions/view(page=${promotionPage.number+1}, status=${status}, keyword=${keyword}, discountType=${discountType}, timeFilter=${timeFilter})}">
                            Sau
                        </a>

                        <span class="page-link" th:if="${promotionPage.last}">Sau</span>
                    </li>
                </ul>
            </nav>

        </div>
    </main>
</div>
</body>
</html>
