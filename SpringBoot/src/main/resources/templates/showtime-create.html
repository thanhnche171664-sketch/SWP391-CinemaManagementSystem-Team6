<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm suất chiếu</title>

    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-showtime.css}">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar('showtimes')"></div>

    <main class="content">

        <!-- Header -->
        <div class="header">
            <div>
                <h1>Thêm suất chiếu</h1>
                <p>Tạo lịch chiếu phim mới</p>
            </div>
        </div>

        <!-- Form -->
        <form th:action="@{|${showtimeBasePath}/create|}" method="post" class="showtime-form">

            <!-- Movie -->
            <div class="form-group">
                <label>Phim</label>
                <select name="movieId" class="form-select" required>
                    <option value="">-- Chọn phim --</option>
                    <option th:each="m : ${movies}"
                            th:value="${m.movieId}"
                            th:text="${m.title}">
                    </option>
                </select>
            </div>

            <!-- Branch -->
            <div class="form-group">
                <label>Rạp chiếu</label>
                <select id="branchSelect" name="branchId" class="form-select" th:disabled="${isManager}">
                    <option value="">-- Chọn rạp --</option>
                    <option th:each="b : ${branches}"
                            th:value="${b.branchId}"
                            th:selected="${selectedBranchId != null and b.branchId == selectedBranchId}"
                            th:text="${b.branchName}">
                    </option>
                </select>
            </div>

            <!-- Room -->
            <div class="form-group">
                <label>Phòng</label>
                <select name="roomId" id="roomSelect" class="form-select" required>
                    <option value="">-- Chọn phòng --</option>
                </select>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label>Ngày chiếu</label>
                <input type="date" id="date" class="form-input" required>
            </div>

            <!-- Time -->
            <div class="form-group">
                <label>Giờ chiếu</label>
                <input type="time" id="time" class="form-input" required>
            </div>

            <!-- Hidden startTime -->
            <input type="hidden" name="startTime" id="startTime">

            <!-- Error -->
            <div th:if="${error}" class="error-box">
                <span th:text="${error}"></span>
            </div>

            <!-- Submit -->
            <div class="form-actions">
                <a class="btn-secondary" th:href="@{|${showtimeBasePath}|}">Quay lại</a>
                <button type="submit" class="btn-primary">Tạo suất chiếu</button>
            </div>

        </form>

    </main>
</div>

<script th:inline="javascript">
    const roomsUrl = /*[[${roomsBasePath}]]*/ '/admin/rooms/by-branch';
    const branchSelect = document.getElementById("branchSelect");
    const roomSelect = document.getElementById("roomSelect");

    function loadRooms(branchId) {
        roomSelect.innerHTML = '<option value="">-- Chọn phòng --</option>';

        if (!branchId) return;

        fetch(`${roomsUrl}?branchId=${branchId}`)
            .then(res => res.json())
            .then(data => {
                if (data.length === 0) {
                    const option = document.createElement("option");
                    option.textContent = "Không có phòng";
                    option.disabled = true;
                    roomSelect.appendChild(option);
                    return;
                }

                data.forEach(room => {
                    const option = document.createElement("option");
                    option.value = room.roomId ?? room.id;
                    option.textContent = room.roomName ?? room.name;
                    roomSelect.appendChild(option);
                });
            })
            .catch(err => console.error("Lỗi fetch:", err));
    }

    if (branchSelect) {
        branchSelect.addEventListener("change", function () {
            loadRooms(this.value);
        });

        if (branchSelect.value) {
            loadRooms(branchSelect.value);
        }
    }

    // combine date + time
    document.querySelector("form").addEventListener("submit", function (event) {
        const date = document.getElementById("date").value;
        const time = document.getElementById("time").value;

        if (!date || !time) {
            alert("Vui lòng chọn ngày và giờ");
            event.preventDefault();
            return;
        }

        document.getElementById("startTime").value = date + "T" + time;
    });
</script>

</body>
</html>
