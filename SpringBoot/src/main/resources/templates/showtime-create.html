<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm suất chiếu</title>

    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-showtime.css}">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div th:replace="fragments/sidebar :: sidebar('showtimes')"></div>

    <main class="content">

        <!-- Header -->
        <div class="header">
            <div>
                <h1>Thêm suất chiếu</h1>
                <p>Tạo lịch chiếu phim mới</p>
            </div>
        </div>

        <form th:action="@{|${showtimeBasePath}/create|}" method="post" class="showtime-form">

            <!-- BRANCH -->
            <div class="form-group">
                <label>Rạp chiếu</label>
                <select id="branchSelect" name="branchId" class="form-select" th:disabled="${isManager}">
                    <option value="">-- Chọn rạp --</option>
                    <option th:each="b : ${branches}"
                            th:value="${b.branchId}"
                            th:selected="${selectedBranchId != null and b.branchId == selectedBranchId}"
                            th:text="${b.branchName}">
                    </option>
                </select>

                <!-- nếu manager thì vẫn gửi branchId -->
                <input type="hidden" name="branchId"
                       th:if="${isManager}"
                       th:value="${selectedBranchId}">
            </div>

            <!-- MOVIE -->
            <div class="form-group">
                <label>Phim</label>
                <select name="movieId" id="movieSelect" class="form-select" required>
                    <option value="">-- Chọn phim --</option>
                </select>
            </div>

            <!-- ROOM -->
            <div class="form-group">
                <label>Phòng</label>
                <select name="roomId" id="roomSelect" class="form-select" required>
                    <option value="">-- Chọn phòng --</option>
                </select>
            </div>

            <!-- DATE -->
            <div class="form-group">
                <label>Ngày chiếu</label>
                <input type="date" id="date" class="form-input" required>
            </div>

            <!-- TIME -->
            <div class="form-group">
                <label>Giờ chiếu</label>
                <input type="time" id="time" class="form-input" required>
            </div>

            <input type="hidden" name="startTime" id="startTime">

            <div th:if="${error}" class="error-box">
                <span th:text="${error}"></span>
            </div>

            <div class="form-actions">
                <a class="btn-secondary" th:href="@{|${showtimeBasePath}|}">Quay lại</a>
                <button type="submit" class="btn-primary">Tạo suất chiếu</button>
            </div>

        </form>

    </main>
</div>

<script th:inline="javascript">

    const branchSelect = document.getElementById("branchSelect");
    const roomSelect = document.getElementById("roomSelect");
    const movieSelect = document.getElementById("movieSelect");

    const roomsUrl = /*[[${roomsBasePath}]]*/ '/admmin/rooms/by-branch';
    const moviesUrl = '/admin/movies/by-branch';

    // ===== LOAD ROOMS =====
    function loadRooms(branchId) {
        roomSelect.innerHTML = '<option value="">-- Chọn phòng --</option>';

        if (!branchId) return;

        fetch(`${roomsUrl}?branchId=${branchId}`)
            .then(res => res.json())
            .then(data => {

                if (data.length === 0) {
                    const option = document.createElement("option");
                    option.textContent = "Không có phòng";
                    option.disabled = true;
                    roomSelect.appendChild(option);
                    return;
                }

                data.forEach(room => {
                    const option = document.createElement("option");
                    option.value = room.roomId;
                    option.textContent = room.roomName;
                    roomSelect.appendChild(option);
                });
            })
            .catch(err => console.error("Lỗi load room:", err));
    }

    // ===== LOAD MOVIES =====
    function loadMovies(branchId) {
        movieSelect.innerHTML = '<option value="">-- Chọn phim --</option>';

        if (!branchId) return;

        fetch(`${moviesUrl}?branchId=${branchId}`)
            .then(res => res.json())
            .then(data => {

                if (data.length === 0) {
                    const option = document.createElement("option");
                    option.textContent = "Không có phim";
                    option.disabled = true;
                    movieSelect.appendChild(option);
                    return;
                }

                data.forEach(movie => {
                    const option = document.createElement("option");
                    option.value = movie.movieId;
                    option.textContent = movie.title;
                    movieSelect.appendChild(option);
                });
            })
            .catch(err => console.error("Lỗi load movie:", err));
    }

    // ===== EVENT CHANGE BRANCH =====
    if (branchSelect) {
        branchSelect.addEventListener("change", function () {
            const branchId = this.value;
            loadRooms(branchId);
            loadMovies(branchId);
        });

        // load khi page load (manager auto)
        if (branchSelect.value) {
            loadRooms(branchSelect.value);
            loadMovies(branchSelect.value);
        }
    }

    // ===== COMBINE DATE + TIME =====
    document.querySelector("form").addEventListener("submit", function (event) {
        const date = document.getElementById("date").value;
        const time = document.getElementById("time").value;

        if (!date || !time) {
            alert("Vui lòng chọn ngày và giờ");
            event.preventDefault();
            return;
        }

        document.getElementById("startTime").value = date + "T" + time;
    });

</script>

</body>
</html>
