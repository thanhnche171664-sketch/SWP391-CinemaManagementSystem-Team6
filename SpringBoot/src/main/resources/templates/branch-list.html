<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý rạp chiếu</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
</head>
<body>

<div class="layout">

    <div th:replace="fragments/sidebar :: sidebar('branches')"></div>

    <main class="content">

        <header class="header">
            <div>
                <h1>Quản lý rạp chiếu</h1>
                <p>Quản lý rạp, phòng chiếu và ghế ngồi</p>
                <div class="tabs">
                    <a th:href="${branchBasePath}"
                       class="tab active">
                        Rạp chiếu
                    </a>

                    <a th:href="${roomBasePath}"
                       class="tab">
                        Phòng chiếu
                    </a>

                    <a th:href="${pricingBasePath}"
                       class="tab">
                        Cấu hình ghế
                    </a>
                </div>
            </div>

            <a class="btn-add" th:href="${branchBasePath + '/new'}">+ Thêm rạp mới</a>
        </header>



        <form class="search-box" th:action="${branchBasePath + '/search'}" method="get">
            <input type="text"
                   name="keyword"
                   placeholder="Tìm kiếm theo tên rạp"
                   th:value="${keyword}">
        </form>

        <div class="branch-list">

            <div class="branch-card" th:each="branch : ${branches}">

                <div class="branch-header">
                    <div>
                        <h2 th:text="${branch.branchName}">Tên rạp</h2>
                        <p th:text="${branch.city}">Thành phố</p>
                        <p th:text="${branch.address}">Địa chỉ</p>

                        <span class="status"
                              th:classappend="${branch.status.name() == 'active'
                                  ? 'active' : 'inactive'}"
                              th:text="${branch.status.name() == 'active'
                                  ? 'Đang hoạt động'
                                  : 'Ngưng hoạt động'}">
                        </span>
                    </div>

                    <div class="actions">

                        <a th:href="${branchBasePath + '/edit/' + branch.branchId}"
                           class="edit-link"
                           title="Chỉnh sửa">
                            <img th:src="@{/images/edit.png}"
                                 alt="edit"
                                 class="edit-icon">
                        </a>

                        <a th:href="${branchBasePath + '/toggle-status/' + branch.branchId}"
                           class="status-btn"
                           th:title="${branch.status.name() == 'active'
           ? 'Ngưng hoạt động'
           : 'Kích hoạt'}"
                           th:text="${branch.status.name() == 'active'
           ? '✅'
           : '🚫'}">
                        </a>

                    </div>
                </div>

                <div class="rooms">
                    <div class="room-card" th:each="room : ${branch.rooms}">

                        <div class="room-header">
                            <h4 th:text="${room.roomName}">Phòng</h4>

                            <a class="room-edit-btn"
                               th:href="${roomBasePath + '/' + room.roomId}"
                               title="Sửa phòng">
                                <img th:src="@{/images/edit.png}"
                                     alt="edit"
                                     class="edit-icon">
                            </a>
                        </div>

                        <p>
                            <span th:text="${room.totalSeats}">0</span> ghế
                        </p>

                    </div>



                    <p th:if="${#lists.isEmpty(branch.rooms)}"
                       style="color:#aaa;margin-top:10px">
                        Chưa có phòng chiếu
                    </p>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
