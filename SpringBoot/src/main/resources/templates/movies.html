<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - Cinema Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="movies-page">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Cinema Management System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/movies}">Movies</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/showtimes}">Showtimes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/login}">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="movies-hero">
        <div class="container">
            <div class="hero-content">
                <h1>Trải nghiệm điện ảnh đỉnh cao</h1>
                <p>Đặt vé xem phim nhanh chóng, tiện lợi với CinemaHub</p>
            </div>
            <div class="hero-filters">
                <div class="status-tabs">
                    <button class="status-tab active" type="button" data-status="">Tất cả</button>
                    <button class="status-tab" type="button" data-status="now_showing">Đang chiếu</button>
                    <button class="status-tab" type="button" data-status="upcoming">Sắp chiếu</button>
                </div>
                <div class="filter-group">
                    <div class="search-input">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="Tìm kiếm phim...">
                    </div>
                    <div class="genre-filter">
                        <span class="genre-label">Thể loại:</span>
                        <select id="genreFilter">
                            <option value="">Tất cả thể loại</option>
                            <option th:each="genre : ${genreList}"
                                    th:value="${genre.genreName}"
                                    th:text="${genre.genreName}">
                                Genre
                            </option>
                        </select>
                    </div>
                    <select class="visually-hidden" id="statusFilter">
                        <option value="">all</option>
                        <option value="now_showing">now_showing</option>
                        <option value="upcoming">upcoming</option>
                        <option value="stopped">stopped</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <section class="movies-grid">
        <div class="container">
            <div class="movie-cards" id="movieList">
                <a class="movie-card movie-item"
                   th:each="movie : ${movies}"
                   th:href="@{/movies/{id}(id=${movie.movieId})}"
                   th:attr="data-title=${movie.title != null ? #strings.toLowerCase(movie.title) : ''},
                            data-status=${movie.status != null ? #strings.toLowerCase(movie.status) : ''},
                            data-genres=${movie.genreNames != null ? #strings.toLowerCase(movie.genreNames) : ''}">
                    <div class="movie-poster">
                        <img th:if="${movie.posterUrl}" th:src="${movie.posterUrl}" th:alt="${movie.title}">
                        <div th:if="${movie.posterUrl == null}" class="poster-placeholder">No Image</div>
                        <span class="status-pill"
                              th:classappend="' status-' + ${movie.status}"
                              th:text="${#strings.toLowerCase(movie.status) == 'now_showing' ? 'Đang chiếu' : (#strings.toLowerCase(movie.status) == 'upcoming' ? 'Sắp chiếu' : 'Ngừng chiếu')}">
                        </span>
                    </div>
                    <div class="movie-info">
                        <h3 th:text="${movie.title}">Movie Title</h3>
                        <div class="movie-meta">
                            <span th:text="${movie.duration} + ' phút'">120 phút</span>
                            <span th:text="${movie.ageRating}">C13</span>
                        </div>
                        <div class="movie-tags">
                            <span class="tag" th:each="genre : ${movie.genres}" th:text="${genre.genreName}">Genre</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2026 Cinema Management System - Team 6. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const searchInput = document.getElementById('searchInput');
        const statusFilter = document.getElementById('statusFilter');
        const genreFilter = document.getElementById('genreFilter');
        const movieItems = document.querySelectorAll('.movie-item');
        const statusTabs = document.querySelectorAll('.status-tab');

        function normalize(value) {
            return (value || '').toString().toLowerCase().trim();
        }

        function applyFilters() {
            const searchValue = normalize(searchInput.value);
            const statusValue = normalize(statusFilter.value);
            const genreValue = normalize(genreFilter.value);

            movieItems.forEach(item => {
                const title = normalize(item.dataset.title);
                const status = normalize(item.dataset.status);
                const genres = normalize(item.dataset.genres);

                const matchesSearch = searchValue === '' || title.includes(searchValue);
                const matchesStatus = statusValue === '' || status === statusValue;
                const matchesGenre = genreValue === '' || genres.includes(genreValue);

                item.style.display = (matchesSearch && matchesStatus && matchesGenre) ? '' : 'none';
            });
        }

        statusTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                statusTabs.forEach(btn => btn.classList.remove('active'));
                tab.classList.add('active');
                statusFilter.value = tab.dataset.status || '';
                applyFilters();
            });
        });

        searchInput.addEventListener('input', applyFilters);
        genreFilter.addEventListener('change', applyFilters);
    </script>
</body>
</html>
