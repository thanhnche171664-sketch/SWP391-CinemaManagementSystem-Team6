<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - Cinema Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div th:replace="~{fragments/public-header :: publicHeader}"></div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
            <h2 class="mb-0">All Movies</h2>
            <a th:href="@{/}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Quay lại
            </a>
        </div>

        <form th:action="@{/movies}" method="get" class="row mb-4 g-2">
            <div class="col-md-5">
                <div class="input-group">
                    <input type="text" class="form-control" name="search" th:value="${search}" placeholder="Tìm kiếm phim...">
                    <button type="submit" class="btn btn-primary" aria-label="Tìm kiếm">
                        <i class="bi bi-search"></i> Tìm kiếm
                    </button>
                </div>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="status" onchange="this.form.submit()">
                    <option value="">Tất cả trạng thái</option>
                    <option value="now_showing" th:selected="${statusFilter == 'now_showing'}">Đang chiếu</option>
                    <option value="upcoming" th:selected="${statusFilter == 'upcoming'}">Sắp chiếu</option>
                    <option value="stopped" th:selected="${statusFilter == 'stopped'}">Đã dừng</option>
                </select>
            </div>
            <div class="col-md-3">
                <select class="form-select" name="genre" onchange="this.form.submit()">
                    <option value="">Tất cả thể loại</option>
                    <option th:each="g : ${genreList}" th:value="${g.genreName}" th:text="${g.genreName}"
                            th:selected="${genreFilter != null && !genreFilter.isEmpty() && genreFilter == g.genreName}"></option>
                </select>
            </div>
        </form>

        <div class="row" id="movieList">
            <div class="col-md-3 mb-4" th:each="movie : ${movies}">
                <div class="card h-100">
                    <img th:src="${movie.posterUrl}" class="card-img-top" th:alt="${movie.title}" style="height: 400px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${movie.title}">Movie Title</h5>
                        <div class="mb-2">
                            <span class="badge bg-primary" th:text="${movie.status}">Status</span>
                            <span class="badge bg-secondary" th:text="${movie.genreNames}">Genre</span>
                        </div>
                        <p class="card-text">
                            <small class="text-muted">
                                <i class="bi bi-clock"></i> <span th:text="${movie.duration} + ' min'">120 min</span>
                                | <i class="bi bi-star"></i> <span th:text="${movie.ageRating}">PG-13</span>
                            </small>
                        </p>
                    </div>
                    <div class="card-footer">
                        <a th:href="@{/movies/{id}(id=${movie.movieId})}" class="btn btn-primary w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(movies)}" class="alert alert-info" role="alert">Không tìm thấy phim nào phù hợp.</div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2026 Cinema Management System - Team 6. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
