<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies - CinemaGO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="movies-page">
    <div th:replace="~{fragments/public-header :: publicHeader}"></div>

    <section class="movies-hero">
        <div class="container">
            <div class="row align-items-end g-4">
                <div class="col-lg-6 hero-content">
                    <h1>Trải nghiệm điện ảnh đỉnh cao</h1>
                    <p>Đặt vé xem phim nhanh chóng, tiện lợi với CinemaGO</p>
                </div>
            </div>
            <form th:action="@{/movies}" method="get" class="hero-filters mt-4">
                <div class="status-tabs">
                    <button type="submit" name="status" value="" class="status-tab"
                            th:classappend="${statusFilter == null || statusFilter == ''} ? ' active' : ''">Tất cả</button>
                    <button type="submit" name="status" value="now_showing" class="status-tab"
                            th:classappend="${statusFilter == 'now_showing'} ? ' active' : ''">Đang chiếu</button>
                    <button type="submit" name="status" value="upcoming" class="status-tab"
                            th:classappend="${statusFilter == 'upcoming'} ? ' active' : ''">Sắp chiếu</button>
                </div>
                <div class="filter-group">
                    <div class="search-input">
                        <i class="bi bi-search search-icon"></i>
                        <input type="search" name="search" th:value="${search}" placeholder="Tìm kiếm phim...">
                    </div>
                    <label class="genre-filter">
                        <span>Thể loại</span>
                        <select name="genre" onchange="this.form.submit()">
                            <option value="">Tất cả thể loại</option>
                            <option th:each="g : ${genreList}" th:value="${g.genreName}" th:text="${g.genreName}"
                                    th:selected="${genreFilter == g.genreName}"></option>
                        </select>
                    </label>
                    <label class="genre-filter">
                        <span>Rạp chiếu</span>
                        <select name="branchId" onchange="this.form.submit()">
                            <option value="">Tất cả rạp</option>
                            <option th:each="b : ${branches}" th:value="${b.branchId}" th:text="${b.branchName}"
                                    th:selected="${branchFilter == b.branchId}"></option>
                        </select>
                    </label>
                </div>
            </form>
        </div>
    </section>

    <section class="movies-grid">
        <div class="container">
            <div class="movie-cards" id="movieList">
                <a class="movie-card" th:each="movie : ${movies}" th:href="@{/movies/{id}(id=${movie.movieId})}"
                   th:with="statusKey=${movie.status != null ? #strings.toLowerCase(movie.status) : ''}">
                    <div class="movie-poster">
                        <img th:if="${movie.posterUrl}" th:src="${movie.posterUrl}" th:alt="${movie.title}">
                        <div class="poster-placeholder" th:unless="${movie.posterUrl}">No Image</div>
                        <span class="status-pill"
                              th:classappend="' status-' + ${statusKey}"
                              th:text="${statusKey == 'now_showing' ? 'Đang chiếu' : (statusKey == 'upcoming' ? 'Sắp chiếu' : 'Ngừng chiếu')}">
                            Đang chiếu
                        </span>
                    </div>
                    <div class="movie-info">
                        <h3 th:text="${movie.title}">Movie Title</h3>
                        <div class="movie-meta">
                            <span th:text="${movie.duration} + ' phút'">120 phút</span>
                            <span th:text="${movie.ageRating}">C13</span>
                        </div>
                        <div class="movie-tags">
                            <span class="tag" th:each="genre : ${#strings.arraySplit(movie.genreNames, ',')}"
                                  th:text="${#strings.trim(genre)}">Action</span>
                        </div>
                    </div>
                </a>
            </div>
            <div th:if="${#lists.isEmpty(movies)}" class="alert alert-info mt-4" role="alert">Không tìm thấy phim nào phù hợp.</div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2026 CinemaGO - Team 6. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
