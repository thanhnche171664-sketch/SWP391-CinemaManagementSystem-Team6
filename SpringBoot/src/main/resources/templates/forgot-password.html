<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quên mật khẩu - CinemaHub</title>
    <link rel="stylesheet" th:href="@{/styles/auth.css}">
</head>
<body class="auth-page">
    <header class="auth-header">
        <a th:href="@{/login}" class="auth-logo">
            <span class="auth-logo-icon">🎬</span>
            <span>CinemaHub</span>
        </a>
        <nav class="auth-nav">
            <a th:href="@{/login}">Đăng nhập</a>
            <a th:href="@{/register}" th:if="${!isAuthenticated}">Đăng ký</a>
        </nav>
    </header>
    <main class="auth-main">
        <div class="auth-main-inner">
            <div class="auth-card">
                <h1>Quên mật khẩu</h1>
                <p class="subtitle">Nhập email đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu</p>
                <div th:if="${message}" class="auth-alert success" th:text="${message}">Message</div>
                <form th:action="@{/forgot-password}" method="post" class="auth-form">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
                    </div>
                    <button type="submit" class="btn-submit">Gửi link đặt lại mật khẩu</button>
                </form>
                <div class="auth-footer">
                    <p><a th:href="@{/login}">← Quay lại đăng nhập</a></p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
