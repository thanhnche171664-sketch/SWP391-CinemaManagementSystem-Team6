<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chọn ghế - Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="booking-seat-page">
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<div class="container py-4">
    <div class="booking-seat-shell">
    <p class="mb-3">
        <a th:href="@{/movies/{id}(id=${showtime.movie.movieId})}" class="btn booking-seat-back-btn btn-sm">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/></svg>
            Quay lại
        </a>
    </p>
    <h2 class="booking-seat-title" th:text="${showtime.movie.title}">Movie</h2>
    <p class="booking-seat-subtitle">
        <span th:text="${showtime.room.roomName}">Room</span> –
        <span th:text="${showtime.room.branch.branchName}">Branch</span> –
        <span th:text="${#temporals.format(showtime.startTime, 'dd/MM/yyyy HH:mm')}">Time</span>
    </p>

    <div class="screen">——— MÀN HÌNH ———</div>

    <form id="bookingForm" th:action="@{/booking/create}" method="post">
        <input type="hidden" name="showtimeId" th:value="${showtime.showtimeId}">
        <div class="seat-map" id="seatMap">
            <div th:each="row : ${rows}" class="seat-row">
                <span class="row-label" th:text="${row}">A</span>
                <th:block th:each="seat : ${seatsByRow[__${row}__]}">
                    <label class="seat-option" th:classappend="${occupiedIds.contains(seat.seatId)} ? 'occupied' : 'available'"
                           th:attr="data-price=${seatPrices != null and seatPrices[seat.seatId] != null ? seatPrices[seat.seatId].intValue() : 0}">
                        <input type="checkbox" name="seatIds" th:value="${seat.seatId}"
                               th:disabled="${occupiedIds.contains(seat.seatId)}">
                        <span th:text="${seat.seatNumber}">1</span>
                    </label>
                </th:block>
            </div>
        </div>

        <div class="booking-seat-action">
            <p class="total-line">Tổng: <span id="totalAmount">0</span> VND</p>
            <button type="submit" class="btn booking-seat-pay-btn btn-lg" id="submitBtn" disabled>Thanh toán PayOS</button>
            <a th:href="@{/movies}" class="btn booking-seat-back-solid-btn btn-lg">Quay lại</a>
        </div>
    </form>
</div>
</div>

<script th:inline="javascript">
    (function() {
        const form = document.getElementById('bookingForm');
        const totalEl = document.getElementById('totalAmount');
        const submitBtn = document.getElementById('submitBtn');
        const checkboxes = form.querySelectorAll('input[name="seatIds"]:not([disabled])');

        function updateTotal() {
            let total = 0;
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    const label = cb.closest('label');
                    const price = parseInt(label.getAttribute('data-price') || '0', 10);
                    total += price;
                }
            });
            totalEl.textContent = total.toLocaleString();
            submitBtn.disabled = total === 0;
        }

        form.querySelectorAll('.seat-option:not(.occupied)').forEach(label => {
            label.addEventListener('click', function(e) {
                if (this.classList.contains('occupied')) return;
                const cb = this.querySelector('input');
                if (cb) {
                    cb.checked = !cb.checked;
                    this.classList.toggle('selected', cb.checked);
                    updateTotal();
                }
            });
        });
        checkboxes.forEach(cb => {
            cb.addEventListener('change', function() {
                const label = this.closest('label');
                if (label) label.classList.toggle('selected', this.checked);
                updateTotal();
            });
        });
    })();
</script>
</body>
</html>
