<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đặt vé - Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="booking-history-page">
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<div class="container py-4">
    <div class="history-shell">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <div>
            <h2 class="mb-1">Lịch sử đặt vé</h2>
            <p class="history-subtitle mb-0">Theo dõi trạng thái vé và thanh toán của bạn.</p>
        </div>
        <a th:href="@{/}" class="btn btn-outline-light history-btn-secondary">Quay lại</a>
    </div>

    <div th:if="${#lists.isEmpty(bookings)}" class="alert history-empty-alert">
        Bạn chưa có đơn đặt vé nào.
    </div>

    <div th:if="${!#lists.isEmpty(bookings)}" class="table-responsive history-table-wrap">
        <table class="table history-table">
            <thead>
            <tr>
                <th>Mã vé</th>
                <th>Phim</th>
                <th>Suất chiếu</th>
                <th>Phòng / Chi nhánh</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th>Thanh toán</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${bookings}">
                <td class="mono-cell" th:text="${b.bookingId}"></td>
                <td th:text="${b.movieTitle}"></td>
                <td th:text="${#temporals.format(b.showtimeStart, 'dd/MM/yyyy HH:mm')}"></td>
                <td><span th:text="${b.roomName}"></span> / <span th:text="${b.branchName}"></span></td>
                <td th:text="${b.totalAmount} + ' VND'"></td>
                <td>
                    <span class="booking-chip"
                          th:classappend="${' status-' + b.status}"
                          th:text="${b.status}"></span>
                </td>
                <td>
                    <span th:if="${b.paymentStatus != null}"
                          class="booking-chip payment-chip"
                          th:classappend="${' payment-' + b.paymentStatus}"
                          th:text="${b.paymentStatus}"></span>
                    <span th:if="${b.paymentStatus == null}" class="text-muted">-</span>
                </td>
                <td>
                    <a th:href="@{/booking/detail/{id}(id=${b.bookingId})}"
                       class="btn btn-sm btn-outline-light history-btn-secondary">Chi tiết</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex gap-2 mt-3">
        <a th:href="@{/movies}" class="btn btn-light history-btn-primary">Đặt vé mới</a>
        <a th:href="@{/}" class="btn btn-outline-light history-btn-secondary">Về trang chủ</a>
    </div>
    </div>
</div>
</body>
</html>
