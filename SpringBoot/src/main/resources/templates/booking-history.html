<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đặt vé - Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h2 class="mb-0">Lịch sử đặt vé</h2>
        <a th:href="@{/}" class="btn btn-outline-secondary">Quay lại</a>
    </div>
    <div th:if="${#lists.isEmpty(bookings)}" class="alert alert-info">Bạn chưa có đơn đặt vé nào.</div>
    <div th:if="${!#lists.isEmpty(bookings)}" class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>Mã vé</th>
                <th>Phim</th>
                <th>Suất chiếu</th>
                <th>Phòng / Chi nhánh</th>
                <th>Tổng tiền</th>
                <th>Trạng thái</th>
                <th>Thanh toán</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${bookings}">
                <td th:text="${b.bookingId}"></td>
                <td th:text="${b.movieTitle}"></td>
                <td th:text="${#temporals.format(b.showtimeStart, 'dd/MM/yyyy HH:mm')}"></td>
                <td><span th:text="${b.roomName}"></span> / <span th:text="${b.branchName}"></span></td>
                <td th:text="${b.totalAmount} + ' VND'"></td>
                <td><span class="badge bg-secondary" th:text="${b.status}"></span></td>
                <td th:text="${b.paymentStatus != null ? b.paymentStatus : '-'}"></td>
                <td><a th:href="@{/booking/detail/{id}(id=${b.bookingId})}" class="btn btn-sm btn-outline-primary">Chi tiết</a></td>
            </tr>
            </tbody>
        </table>
    </div>
    <a th:href="@{/movies}" class="btn btn-primary mt-3">Đặt vé mới</a>
    <a th:href="@{/}" class="btn btn-outline-secondary mt-3 ms-2">Về trang chủ</a>
</div>
</body>
</html>
