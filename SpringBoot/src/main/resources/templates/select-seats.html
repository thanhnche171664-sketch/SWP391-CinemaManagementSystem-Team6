<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chọn ghế - CinemaGO</title>
    <link rel="stylesheet" th:href="@{/styles/auth.css}">
    <style>
        .page-wrap { min-height: 100vh; background: #0a0a0a; color: #fff; display: flex; flex-direction: column; }
        .main-wrap { flex: 1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%; }
        .screen { text-align: center; color: #888; margin-bottom: 24px; font-size: 0.9rem; }
        .seats-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 24px; }
        .seat { width: 36px; height: 36px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-size: 0.75rem; cursor: pointer; border: 2px solid transparent; }
        .seat.available { background: #1a1a1a; border-color: #444; color: #ccc; }
        .seat.available:hover { border-color: #e50914; color: #fff; }
        .seat.selected { background: #e50914; border-color: #e50914; color: #fff; }
        .seat.occupied { background: #333; color: #666; cursor: not-allowed; }
        .legend { display: flex; gap: 24px; justify-content: center; margin-bottom: 24px; font-size: 0.9rem; color: #888; }
        .booking-form { background: rgba(22,22,22,0.95); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .booking-form input[type="hidden"] { display: none; }
        .btn-pay { width: 100%; padding: 14px; background: linear-gradient(135deg, #e50914, #b20710); border: none; border-radius: 10px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
        .total-line { margin-top: 12px; font-size: 1.1rem; }
    </style>
</head>
<body class="page-wrap">
<header class="auth-header">
    <a th:href="@{/movies}" class="auth-logo">
        <span class="auth-logo-icon">&#127917;</span>
        <span>CinemaGO</span>
    </a>
    <nav class="auth-nav">
        <a th:href="@{/movies}">Phim</a>
        <a th:href="@{/bookings}">Vé của tôi</a>
        <a th:href="@{/login}" th:if="${!isAuthenticated}">Đăng nhập</a>
        <form method="post" th:action="@{/logout}" th:if="${isAuthenticated and _csrf != null}" style="display: inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Đăng xuất</button>
        </form>
    </nav>
</header>
<main class="main-wrap">
    <h1 th:text="${showtime.movie.title}">Phim</h1>
    <p style="color: #888;" th:text="${showtime.room.branch.branchName + ' - ' + showtime.room.roomName + ' - ' + #temporals.format(showtime.startTime, 'dd/MM/yyyy HH:mm')}">Suất chiếu</p>
    <div class="screen">——— Màn hình ———</div>
    <div class="legend">
        <span><span class="seat available" style="cursor:default;">A1</span> Trống</span>
        <span><span class="seat selected" style="cursor:default;">A2</span> Đang chọn</span>
        <span><span class="seat occupied" style="cursor:default;">A3</span> Đã đặt</span>
    </div>
    <form id="bookingForm" th:action="@{/booking/create}" method="post" class="booking-form">
        <input type="hidden" name="_csrf" th:value="${_csrf.token}"/>
        <input type="hidden" name="showtimeId" th:value="${showtime.showtimeId}"/>
        <div class="seats-grid">
            <th:block th:each="seat : ${seats}">
                <label th:classappend="${occupiedIds.contains(seat.seatId)} ? 'occupied' : 'available'" class="seat" th:id="${'seat-' + seat.seatId}">
                    <input type="checkbox" name="seatIds" th:value="${seat.seatId}" th:disabled="${occupiedIds.contains(seat.seatId)}" style="display: none;" th:id="${'cb-' + seat.seatId}"/>
                    <span th:text="${seat.seatRow + seat.seatNumber}">A1</span>
                </label>
            </th:block>
        </div>
        <p class="total-line">Đã chọn: <strong id="count">0</strong> ghế. Nhấn "Thanh toán" để tiếp tục.</p>
        <button type="submit" class="btn-pay" id="btnPay" disabled>Thanh toán</button>
    </form>
</main>
<script th:inline="javascript">
    document.querySelectorAll('.seat.available').forEach(function(label) {
        label.addEventListener('click', function() {
            var cb = document.getElementById('cb-' + this.getAttribute('id').replace('seat-',''));
            if (!cb) return;
            cb.checked = !cb.checked;
            this.classList.toggle('selected', cb.checked);
            updateCount();
        });
    });
    function updateCount() {
        var n = document.querySelectorAll('input[name="seatIds"]:checked').length;
        document.getElementById('count').textContent = n;
        document.getElementById('btnPay').disabled = n === 0;
    }
</script>
</body>
</html>
