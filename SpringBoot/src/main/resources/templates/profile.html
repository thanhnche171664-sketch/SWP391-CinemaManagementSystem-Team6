<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
          rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }

        .profile-card {
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .profile-header {
            background: linear-gradient(45deg, #4e73df, #224abe);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 30px;
            text-align: center;
        }

        .profile-avatar {
            width: 90px;
            height: 90px;
            background: white;
            color: #4e73df;
            border-radius: 50%;
            font-size: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        .profile-body {
            padding: 30px;
        }

        .info-item {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .info-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center py-5">
    <div class="col-md-7">

        <div class="card profile-card">

            <!-- Header -->
            <div class="profile-header">
                <div class="profile-avatar mb-3">
                    <i class="bi bi-person-fill"></i>
                </div>
                <h4 th:text="${user.fullName}">Full Name</h4>
                <span class="badge bg-light text-dark"
                      th:text="${user.role}">Role</span>
            </div>

            <div class="profile-body">

                <!-- ===== VIEW MODE ===== -->
                <div th:if="${!edit}">

                    <div class="info-item">
                        <i class="bi bi-envelope-fill me-2 text-primary"></i>
                        <strong>Email:</strong>
                        <span th:text="${user.email}"></span>
                    </div>

                    <div class="info-item">
                        <i class="bi bi-telephone-fill me-2 text-success"></i>
                        <strong>Phone:</strong>
                        <span th:text="${user.phone}"></span>
                    </div>

                    <div class="info-item">
                        <i class="bi bi-check-circle-fill me-2 text-warning"></i>
                        <strong>Status:</strong>
                        <span class="badge bg-success"
                              th:text="${user.status}"></span>
                    </div>

                    <div class="info-item">
                        <i class="bi bi-calendar-fill me-2 text-danger"></i>
                        <strong>Created At:</strong>
                        <span th:text="${user.createdAt}"></span>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <a th:href="@{/profile(edit=true)}"
                           class="btn btn-primary btn-lg rounded-pill">
                            <i class="bi bi-pencil-square"></i>
                            Update Profile
                        </a>

                        <button type="button" class="btn btn-outline-danger btn-lg rounded-pill"
                                data-bs-toggle="modal" data-bs-target="#changePasswordModal">
                            <i class="bi bi-shield-lock-fill"></i>
                            Change Password
                        </button>
                    </div>
                </div>

                <!-- ===== EDIT MODE ===== -->
                <div th:if="${edit}">
                    <form th:action="@{/profile/update}"
                          th:object="${user}"
                          method="post">

                        <input type="hidden" th:field="*{userId}"/>

                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text"
                                   class="form-control form-control-lg"
                                   th:field="*{fullName}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email"
                                   class="form-control form-control-lg"
                                   th:field="*{email}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   class="form-control form-control-lg"
                                   th:field="*{phone}">
                        </div>

                        <div th:if="${error}"
                             class="alert alert-danger rounded-3">
                            <i class="bi bi-exclamation-triangle-fill"></i>
                            <span th:text="${error}"></span>
                        </div>

                        <div class="d-flex justify-content-between mt-4">
                            <a th:href="@{/profile}"
                               class="btn btn-outline-secondary rounded-pill px-4">
                                Cancel
                            </a>
                            <button type="submit"
                                    class="btn btn-success rounded-pill px-4">
                                <i class="bi bi-save-fill"></i>
                                Save
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </div>

    </div>
</div>
<div class="modal fade" id="changePasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 20px;">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold">Thay đổi mật khẩu</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Mật khẩu hiện tại</label>
                    <input type="password" id="oldPassword" class="form-control" placeholder="Nhập mật khẩu cũ">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mật khẩu mới</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="Tối thiểu 6 ký tự">
                </div>
                <div class="mb-3">
                    <label class="form-label">Xác nhận mật khẩu mới</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="Nhập lại mật khẩu mới">
                </div>
                <div id="pwMessage" class="mt-2 small text-danger"></div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-light rounded-pill" data-bs-dismiss="modal">Hủy</button>
                <button type="button" onclick="submitChangePassword()" class="btn btn-primary rounded-pill px-4">Cập nhật</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function submitChangePassword() {
        const oldPass = document.getElementById('oldPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confPass = document.getElementById('confirmPassword').value;
        const msg = document.getElementById('pwMessage');

        if (newPass !== confPass) {
            msg.innerText = "Mật khẩu xác nhận không khớp!";
            return;
        }

        fetch('/api/user/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                oldPassword: oldPass,
                newPassword: newPass,
                confirmPassword: confPass
            })
        })
            .then(async response => {
                const text = await response.text();
                if (response.ok) {
                    alert("Thành công: " + text);
                    location.reload();
                } else {
                    msg.innerText = text;
                }
            })
            .catch(err => {
                msg.innerText = "Lỗi kết nối server!";
            });
    }
</script>

</body>
</html>
