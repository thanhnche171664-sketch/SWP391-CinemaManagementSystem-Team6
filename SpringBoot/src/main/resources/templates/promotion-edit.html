<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Khuyến mãi</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-promotion.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar('promotions')"></div>
    <main class="content">
        <div class="card-dark max-w-2xl">
            <h2>Cập nhật: <span th:text="${promotion.promoCode}" style="color: #3b82f6;"></span></h2>

            <div th:if="${error}" class="alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{|${promotionBasePath}/update-action|}" method="post" class="promotion-form">

                <input type="hidden" name="promotionId" th:value="${promotion.promotionId}">

                <div class="form-group">
                    <label>Mã code</label>
                    <input type="text" name="promoCode" class="input-field" th:value="${promotion.promoCode}" readonly>
                </div>

                <div class="form-group">
                    <label>Tên khuyến mãi</label>
                    <input type="text" name="description" class="input-field" th:value="${promotion.description}" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày bắt đầu</label>
                        <input type="datetime-local" name="startDate" class="input-field"
                               th:value="${promotion.startDate}" required>
                    </div>
                    <div class="form-group">
                        <label>Ngày kết thúc</label>
                        <input type="datetime-local" name="endDate" class="input-field"
                               th:value="${promotion.endDate}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Loại giảm giá</label>
                        <select name="discountType" class="input-field">
                            <option value="percent" th:selected="${promotion.discountType.name() == 'percent'}">Phần trăm (%)</option>
                            <option value="amount" th:selected="${promotion.discountType.name() == 'amount'}">Số tiền (đ)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Giá trị</label>
                        <input type="number" name="discountValue" class="input-field" th:value="${promotion.discountValue}" required>
                    </div>
                </div>

                <div class="actions" style="margin-top: 2rem; display: flex; gap: 10px;">
                    <a th:href="@{|${promotionBasePath}/view|}" class="btn-dark" style="text-decoration: none; padding: 10px 20px; border-radius: 4px;">Quay lại</a>
                    <button type="submit" class="btn-white" style="cursor: pointer;">Cập nhật ngay</button>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
