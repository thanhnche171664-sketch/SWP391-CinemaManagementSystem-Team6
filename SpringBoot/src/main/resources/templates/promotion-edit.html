<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật Khuyến mãi</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-promotion.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="layout">
    <div th:replace="fragments/sidebar :: sidebar('promotions')"></div>
    <main class="content">
        <div class="form-container-modal card-dark max-w-2xl">
            <div class="modal-header">
                <h2>Cập nhật mã giảm giá</h2>
                <a th:href="@{|${promotionBasePath}/view|}" class="btn-close" style="text-decoration: none;">&times;</a>
            </div>

            <p class="text-gray-400 mb-8">
                Mã: <strong th:text="${promotion.promoCode}">PROMO</strong>
            </p>

            <div th:if="${error}" class="alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{|${promotionBasePath}/update-action|}" method="post" class="promotion-form">

                <input type="hidden" name="promotionId" th:value="${promotion.promotionId}">

                <div class="form-row">
                    <div class="form-group">
                        <label>Mã code <span class="text-red">*</span></label>
                        <input type="text" name="promoCode" class="input-field" th:value="${promotion.promoCode}" readonly>
                    </div>

                    <div class="form-group">
                        <label>Tên khuyến mãi <span class="text-red">*</span></label>
                        <input type="text" name="description" class="input-field" th:value="${promotion.description}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Ngày bắt đầu <span class="text-red">*</span></label>
                        <input type="datetime-local" name="startDate" class="input-field"
                               th:value="${promotion.startDate != null ? #temporals.format(promotion.startDate, 'yyyy-MM-dd''T''HH:mm') : ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Ngày kết thúc <span class="text-red">*</span></label>
                        <input type="datetime-local" name="endDate" class="input-field"
                               th:value="${promotion.endDate != null ? #temporals.format(promotion.endDate, 'yyyy-MM-dd''T''HH:mm') : ''}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Loại giảm giá</label>
                        <select name="discountType" class="input-field">
                            <option value="percent" th:selected="${promotion.discountType.name() == 'percent'}">Phần trăm (%)</option>
                            <option value="amount" th:selected="${promotion.discountType.name() == 'amount'}">Số tiền (đ)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Giá trị</label>
                        <input type="number" step="0.01" min="0" name="discountValue" class="input-field" th:value="${promotion.discountValue}" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Min booking amount (VNĐ)</label>
                        <input type="number"
                               step="0.01"
                               min="0"
                               name="minBookingAmount"
                               class="input-field"
                               th:value="${promotion.minBookingAmount}"
                               placeholder="VD: 100000">
                    </div>
                    <div class="form-group">
                        <label>Giới hạn số lần sử dụng</label>
                        <input type="number"
                               name="usageLimit"
                               class="input-field"
                               min="0"
                               th:value="${promotion.usageLimit}"
                               required>
                    </div>
                </div>

                <div class="form-actions-modal">
                    <a th:href="@{|${promotionBasePath}/view|}" class="btn-cancel" style="text-decoration: none;">Quay lại</a>
                    <button type="submit" class="btn-submit">Cập nhật ngay</button>
                </div>
            </form>
        </div>
    </main>
</div>
</body>
</html>
