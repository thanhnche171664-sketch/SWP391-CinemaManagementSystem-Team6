<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý phòng chiếu</title>

  <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
  <link rel="stylesheet" th:href="@{/styles/admin-room-list.css}">
</head>
<body>

<div class="layout">
  <div th:replace="fragments/sidebar :: sidebar('branches')"></div>

  <main class="content">
    <header class="header">
      <div>
        <h1>Quản lý rạp chiếu</h1>
        <p>Quản lý rạp, phòng chiếu và ghế ngồi</p>

        <div class="tabs">
          <a th:if="${!isManager}" th:href="${branchBasePath}" class="tab">Rạp chiếu</a>
          <a th:href="${roomBasePath}" class="tab active">Phòng chiếu</a>
          <a th:href="${pricingBasePath}" class="tab">Cấu hình ghế</a>
        </div>
      </div>

      <a class="btn-add" th:href="${roomBasePath + '/new'}">+ Thêm phòng mới</a>
    </header>

    <form method="get" th:action="${roomBasePath}" class="filter-form">

      <input type="text"
             name="keyword"
             placeholder="Tìm phòng..."
             th:value="${keyword}"
             class="filter-input">

      <select name="branchId" class="filter-select" th:if="${!isManager}">
        <option value="">Tất cả chi nhánh</option>

        <option th:each="branch : ${branches}"
                th:value="${branch.branchId}"
                th:text="${branch.branchName}"
                th:selected="${branch.branchId == branchId}">
        </option>
      </select>

      <input type="hidden" name="branchId" th:if="${isManager}" th:value="${branchId}">
      <button type="submit" class="filter-btn">Filter</button>

    </form>

    <table class="table">
      <thead>
      <tr>
        <th>Tên phòng</th>
        <th>Rạp chiếu</th>
        <th>Tổng ghế</th>
        <th>Trạng thái</th>
        <th>Thao tác</th>
      </tr>
      </thead>

      <tbody>
      <tr th:each="room : ${rooms}">
        <td th:text="${room.roomName}"></td>

        <td th:text="${room.branch != null ? room.branch.branchName : '—'}"></td>

        <td th:text="${room.totalSeats + ' ghế'}"></td>

        <td>
                    <span class="status-pill"
                          th:classappend="${room.status.name() == 'active'} ? ' active' : ' inactive'"
                          th:text="${room.status.name() == 'active'} ? 'Hoạt động' : 'Ngưng hoạt động'">
                    </span>
        </td>

        <td class="actions">
          <a class="room-edit-btn"
             th:href="${roomBasePath + '/' + room.roomId}"
             title="Sửa phòng">
            <img th:src="@{/images/edit.png}"
                 alt="edit"
                 class="edit-icon">
          </a>

          <form th:action="${roomBasePath + '/' + room.roomId + '/toggle-status'}"
                method="post"
                style="display:inline">

            <button type="submit"
                    class="status-btn"
                    onclick="return confirm('Bạn có chắc muốn đổi trạng thái phòng này?')">

              Đổi trạng thái
            </button>

          </form>
        </td>
      </tr>
      </tbody>
    </table>

    <div class="pagination">

      <!-- Prev -->
      <a th:if="${currentPage > 0}"
         th:href="${roomBasePath
           + '?page=' + (currentPage - 1)
           + '&keyword=' + (keyword != null ? keyword : '')
           + '&branchId=' + (branchId != null ? branchId : '')}">
        ←
      </a>

      <!-- Pages -->
      <span th:if="${totalPages > 0}"
            th:each="i : ${#numbers.sequence(
            T(java.lang.Math).max(0, currentPage - 2),
            T(java.lang.Math).min(totalPages - 1, currentPage + 2)
        )}">

    <a th:href="${roomBasePath
      + '?page=' + i
      + '&keyword=' + (keyword != null ? keyword : '')
      + '&branchId=' + (branchId != null ? branchId : '')}"
       th:text="${i + 1}"
       th:classappend="${i == currentPage} ? ' active' : ''">
    </a>

  </span>

      <!-- Next -->
      <a th:if="${currentPage < totalPages - 1}"
         th:href="${roomBasePath
           + '?page=' + (currentPage + 1)
           + '&keyword=' + (keyword != null ? keyword : '')
           + '&branchId=' + (branchId != null ? branchId : '')}">
        →
      </a>

    </div>
  </main>
</div>


</body>
</html>
