<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/staff-theme.css}">
    <style>
        .success-card {
            background: #fff;
            border: 1px solid #f0c9d1;
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(31, 90, 166, 0.08);
        }
        .text-success-main { color: #2f855a; }
    </style>
</head>
<body class="staff-page">
<div class="container py-5 text-center">
    <div class="success-card p-4">
        <h2 class="text-success-main">Thanh toán thành công!</h2>
        <p>Mã hóa đơn: <strong th:text="${booking.bookingId}"></strong></p>

        <p>Phim: <strong th:text="${booking.movieTitle}"></strong></p>

        <p>Suất chiếu: <span th:text="${#temporals.format(booking.showtimeStart, 'HH:mm dd/MM/yyyy')}"></span></p>
        <p>Phòng: <span th:text="${booking.roomName}"></span></p>
        <p>Ghế: <span th:text="${#strings.listJoin(booking.seats, ', ')}"></span></p>
        <p>Tổng tiền: <strong th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></strong></p>

        <div class="mt-4">
            <a href="/staff/booking/pos" class="btn staff-btn-primary">Tiếp tục đặt vé</a>
            <a th:href="@{'/staff/booking/print/' + ${booking.bookingId}}" class="btn staff-btn-outline">In vé PDF</a>
        </div>
    </div>
</div>
</body>
</html>
