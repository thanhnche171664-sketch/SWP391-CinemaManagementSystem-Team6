<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Hồ sơ Nhân viên - Cinema System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; }
        .layout { display: flex; height: 100vh; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .glass-card { background: #111; border: 1px solid #222; border-radius: 24px; }
        .input-field { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; }
        .input-field:focus { border-color: #3b82f6; }
        .badge-manager { background: rgba(234, 179, 8, 0.1); color: #eab308; border: 1px solid rgba(234, 179, 8, 0.2); }
        .badge-staff { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border: 1px solid rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>

<div class="layout">
    <div class="content">
        <div class="max-w-5xl mx-auto">
            <div class="header mb-10 flex justify-between items-end">
                <div>
                    <h1 class="text-3xl font-black uppercase tracking-tighter text-blue-500">Thông tin cá nhân</h1>
                    <p class="text-gray-500 mt-1">Xin chào, quản lý tài khoản của bạn tại đây!</p>
                </div>
                <div class="text-right font-mono text-sm text-gray-600">
                    ID Nhân viên: <span th:text="${user.userId}">#000</span>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-6">
                    <div class="glass-card p-8 text-center relative overflow-hidden">
                        <div th:class="${user.role.name() == 'MANAGER' ? 'absolute top-0 left-0 w-full h-1 bg-yellow-500' : 'absolute top-0 left-0 w-full h-1 bg-blue-500'}"></div>

                        <div class="w-24 h-24 bg-[#1a1a1a] rounded-3xl mx-auto flex items-center justify-center mb-4 border border-[#333] shadow-inner">
                            <i data-lucide="user" class="w-10 h-10 text-gray-500"></i>
                        </div>

                        <h2 class="text-xl font-bold" th:text="${user.fullName}">Tên nhân viên</h2>

                        <div class="mt-3">
                            <span th:if="${user.role.name() == 'MANAGER'}" class="badge-manager px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                                <i data-lucide="shield-check" class="w-3 h-3 inline mr-1"></i> Manager
                            </span>
                            <span th:if="${user.role.name() == 'STAFF'}" class="badge-staff px-3 py-1 rounded-full text-xs font-bold uppercase tracking-widest">
                                <i data-lucide="briefcase" class="w-3 h-3 inline mr-1"></i> Staff
                            </span>
                        </div>

                        <div class="mt-8 pt-6 border-t border-[#222] text-left">
                            <div class="mb-4">
                                <span class="text-[10px] text-gray-500 uppercase font-black tracking-widest block mb-1">Cơ sở làm việc</span>
                                <div class="flex items-center gap-2 text-gray-200">
                                    <i data-lucide="map-pin" class="w-4 h-4 text-red-500"></i>
                                    <span class="text-sm font-medium"
                                          th:text="${user.branchId != null ? user.branch.branchName : 'Toàn hệ thống'}">
                                        Nơi làm việc
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-6">
                    <div class="glass-card p-8">
                        <div class="flex items-center gap-3 mb-8 border-b border-[#222] pb-4">
                            <div class="p-2 bg-yellow-500/10 rounded-lg">
                                <i data-lucide="lock" class="text-yellow-500 w-5 h-5"></i>
                            </div>
                            <div>
                                <h3 class="font-bold">Bảo mật tài khoản</h3>
                                <p class="text-xs text-gray-500">Nên thay đổi mật khẩu sau khi nhận tài khoản từ Admin.</p>
                            </div>
                        </div>

                        <div th:if="${error}" class="mb-6 p-4 bg-red-500/10 border border-red-500/20 text-red-500 rounded-xl text-sm italic" th:text="${error}"></div>
                        <div th:if="${success}" class="mb-6 p-4 bg-green-500/10 border border-green-500/20 text-green-500 rounded-xl text-sm" th:text="${success}"></div>

                        <form th:action="@{/employee/profile/change-password}" method="POST" class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-xs font-bold text-gray-400 uppercase ml-1">Mật khẩu hiện tại</label>
                                <input type="password" name="oldPassword" required class="input-field" placeholder="Nhập mật khẩu cũ">
                            </div>

                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Mật khẩu mới</label>
                                    <input type="password" name="newPassword" required minlength="6" class="input-field" placeholder="Tối thiểu 6 ký tự">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-bold text-gray-400 uppercase ml-1">Xác nhận mật khẩu</label>
                                    <input type="password" name="confirmPassword" required class="input-field" placeholder="Nhập lại mật khẩu mới">
                                </div>
                            </div>

                            <div class="pt-4">
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-900/20 uppercase text-xs tracking-widest">
                                    Lưu thay đổi ngay
                                </button>
                            </div>
                        </form>
                    </div>

                    <div class="glass-card p-8">
                        <h3 class="font-bold mb-6 text-sm text-gray-400 uppercase tracking-widest">Thông tin liên hệ</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="flex items-center gap-4">
                                <div class="p-3 bg-white/5 rounded-xl"><i data-lucide="mail" class="w-5 h-5 text-gray-400"></i></div>
                                <div>
                                    <span class="text-[10px] text-gray-600 block uppercase font-bold">Email</span>
                                    <span class="text-gray-300 font-medium" th:text="${user.email}">staff@cinema.com</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="p-3 bg-white/5 rounded-xl"><i data-lucide="phone" class="w-5 h-5 text-gray-400"></i></div>
                                <div>
                                    <span class="text-[10px] text-gray-600 block uppercase font-bold">Số điện thoại</span>
                                    <span class="text-gray-300 font-medium" th:text="${user.phone}">09xxxxxxx</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
