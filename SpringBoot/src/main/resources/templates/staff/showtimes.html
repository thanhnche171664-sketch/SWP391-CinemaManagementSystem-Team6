<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chọn suất chiếu</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-8 bg-slate-50">
<h1 class="text-2xl font-bold mb-6">Chọn suất chiếu</h1>

<div th:if="${#lists.isEmpty(showtimes)}" class="text-red-500 p-4 bg-white rounded shadow">
    Không có suất chiếu nào khả dụng cho phim này tại chi nhánh của bạn.
    <a href="/staff/booking" class="block mt-2 text-blue-600 underline">Quay lại danh sách phim</a>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4" th:if="${!#lists.isEmpty(showtimes)}">
    <a th:each="st : ${showtimes}"
       th:href="@{/staff/booking/seats/{showtimeId}(showtimeId=${st.showtimeId})}"
       class="bg-white p-4 rounded shadow border hover:border-blue-500 hover:bg-blue-50 transition cursor-pointer">

        <h3 class="text-xl font-bold text-blue-900"
            th:text="${st.startTime != null ? #temporals.format(st.startTime, 'HH:mm') : '--:--'}">17:00</h3>

        <p class="text-sm text-gray-600 mt-1"
           th:text="${st.room?.roomName ?: 'Phòng không xác định'}">Room 1</p>

        <p class="text-xs text-gray-400 mt-2">Nhấn để chọn ghế</p>
    </a>
</div>
</body>
</html>
