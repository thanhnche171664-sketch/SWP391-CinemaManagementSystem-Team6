<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
  <h2 class="text-2xl font-bold mb-4 text-green-600">Đặt vé thành công!</h2>
  <div class="space-y-2">
    <p><strong>Mã vé:</strong> <span th:text="${booking.bookingId}"></span></p>
    <p><strong>Phim:</strong> <span th:text="${booking.movieTitle}"></span></p>
    <p><strong>Phòng:</strong> <span th:text="${booking.roomName}"></span></p>
    <p><strong>Ghế:</strong> <span th:text="${#strings.listJoin(booking.seats, ', ')}"></span></p>
    <p><strong>Tổng tiền:</strong> <span th:text="${#numbers.formatDecimal(booking.totalAmount, 0, 'POINT', 0, 'POINT')}"></span> VNĐ</p>
  </div>
  <a href="/staff/booking" class="mt-6 block text-center bg-blue-600 text-white py-2 rounded">Tiếp tục bán vé</a>
</div>
