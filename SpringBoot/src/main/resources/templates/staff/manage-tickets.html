<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Quản lý vé - CinemaGO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/styles/staff-theme.css}">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .ticket-shell { max-width: 1200px; margin: 0 auto; padding: 24px 16px 32px; }
    .ticket-panel { background: #fff; border: 1px solid #f0c9d1; border-radius: 16px; box-shadow: 0 12px 30px rgba(31, 90, 166, 0.08); }
    .ticket-header { display: flex; justify-content: space-between; align-items: end; gap: 12px; flex-wrap: wrap; }
    .ticket-search { display: flex; gap: 10px; flex-wrap: wrap; }
    .ticket-search .form-control { min-width: 280px; border-color: #d6e4ff; }
    .ticket-search .form-control:focus { border-color: #1f5aa6; box-shadow: 0 0 0 0.2rem rgba(31, 90, 166, 0.15); }
    .table thead th { background: #fff5f7; color: #1f3b67; border-bottom: 1px solid #f0c9d1; }
    .badge-paid { background: #e7f7ef; color: #2f855a; border: 1px solid #cbeedb; }
    .badge-other { background: #fff1f1; color: #c6425b; border: 1px solid #f3b7c1; }
    .action-stack { display: flex; gap: 6px; justify-content: end; }
    .btn-icon { width: 34px; height: 34px; border-radius: 8px; border: 1px solid transparent; display: inline-flex; align-items: center; justify-content: center; }
    .btn-view { background: #edf4ff; color: #1f5aa6; border-color: #d6e4ff; }
    .btn-print { background: #e7f7ef; color: #2f855a; border-color: #cbeedb; }
    .btn-cancel { background: #fff1f1; color: #c6425b; border-color: #f3b7c1; }
    .pagination-wrap { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 16px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(31, 59, 103, 0.35); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content-staff { background: #fff; border: 1px solid #f0c9d1; border-radius: 14px; width: min(520px, 92%); padding: 20px; box-shadow: 0 16px 36px rgba(31, 90, 166, 0.16); }
    .hidden { display: none; }
  </style>
</head>
<body class="staff-page">

<div th:replace="~{fragments/staffNav :: staffNav(activePage='manage')}"></div>

<main class="ticket-shell">
  <div class="ticket-panel p-4">
    <div class="ticket-header mb-3">
      <div>
        <h1 class="staff-page-title">Danh sách vé đã đặt</h1>
        <p class="staff-muted mb-0 mt-1" th:text="${'Tổng số vé: ' + bookingPage.totalElements}"></p>
      </div>
      <form action="/staff/booking/manage" method="get" class="ticket-search">
        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Tìm theo tên khách hàng...">
        <button type="submit" class="btn staff-btn-primary">Tìm kiếm</button>
        <a href="/staff/booking/manage" class="btn staff-btn-outline">Reset</a>
      </form>
    </div>

    <div class="table-responsive">
      <table class="table align-middle mb-0">
        <thead>
        <tr>
          <th>Mã vé</th>
          <th>Khách hàng</th>
          <th>Phim</th>
          <th>Thời gian chiếu</th>
          <th>Trạng thái</th>
          <th class="text-end">Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${bookingPage.content}">
          <td th:text="${b.bookingId}"></td>
          <td th:text="${b.user.fullName}"></td>
          <td th:text="${b.showtime.movie.title}"></td>
          <td th:text="${#temporals.format(b.showtime.startTime, 'dd/MM/yyyy HH:mm')}"></td>
          <td>
            <span th:class="${b.status.toString() == 'paid' ? 'badge badge-paid' : 'badge badge-other'}"
                  th:text="${b.status}"></span>
          </td>
          <td>
            <div class="action-stack">
              <button th:onclick="'viewDetail(' + ${b.bookingId} + ')'" class="btn-icon btn-view" type="button" title="Xem chi tiết">
                <i data-lucide="eye" style="width:16px;height:16px"></i>
              </button>
              <button th:if="${b.status.toString() == 'paid'}"
                      th:onclick="'printTicket(' + ${b.bookingId} + ')'"
                      class="btn-icon btn-print" type="button" title="In vé">
                <i data-lucide="printer" style="width:16px;height:16px"></i>
              </button>
              <button th:if="${b.status.toString() == 'paid'}"
                      th:onclick="'cancelTicket(' + ${b.bookingId} + ')'"
                      class="btn-icon btn-cancel" type="button" title="Hủy vé">
                <i data-lucide="trash-2" style="width:16px;height:16px"></i>
              </button>
            </div>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(bookingPage.content)}">
          <td colspan="6" class="text-center py-4 staff-muted">Không có dữ liệu vé.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination-wrap">
      <a th:if="${bookingPage.hasPrevious()}"
         th:href="@{/staff/booking/manage(page=${bookingPage.number - 1}, keyword=${keyword})}" class="btn staff-btn-outline">Trang trước</a>

      <span class="staff-muted" th:text="'Trang ' + (${bookingPage.number} + 1) + ' / ' + ${bookingPage.totalPages}"></span>

      <a th:if="${bookingPage.hasNext()}"
         th:href="@{/staff/booking/manage(page=${bookingPage.number + 1}, keyword=${keyword})}" class="btn staff-btn-outline">Trang sau</a>
    </div>
  </div>
</main>

<div id="detailModal" class="modal-overlay hidden">
  <div class="modal-content-staff">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="staff-page-title fs-5 mb-0">Chi tiết vé #<span id="d_id"></span></h3>
      <button onclick="closeModal()" class="btn btn-sm staff-btn-outline" type="button">Đóng</button>
    </div>
    <div id="d_body" class="small"></div>
  </div>
</div>

<script>
  lucide.createIcons();

  function printTicket(bookingId) {
      window.location.href = '/staff/booking/print/' + bookingId;
  }

  function viewDetail(id) {
    fetch('/staff/booking/api/booking-detail/' + id)
        .then(r => {
            if(!r.ok) throw new Error("Lỗi tải dữ liệu");
            return r.json();
        })
        .then(data => {
            document.getElementById('d_id').innerText = data.bookingId;
            document.getElementById('d_body').innerHTML = `
                <div class="border-bottom pb-2 mb-2">
                    <p class="mb-1">Khách hàng: <strong>${data.customer}</strong></p>
                    <p class="mb-1">Email: <strong>${data.email}</strong></p>
                    <p class="mb-1">SĐT: <strong>${data.phone}</strong></p>
                </div>
                <p class="mb-1">Phim: <strong>${data.movie}</strong></p>
                <p class="mb-1">Phòng: <strong>${data.room}</strong></p>
                <p class="mb-1">Ghế: <strong>${data.seats}</strong></p>
                <p class="mb-1">Mã KM: <strong>${data.promo}</strong></p>
                <p class="mb-0 mt-3 fw-bold text-primary">Tổng thanh toán: ${new Intl.NumberFormat('vi-VN').format(data.total)} VNĐ</p>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
            lucide.createIcons();
        })
        .catch(() => alert("Không thể tải thông tin vé!"));
  }

  function cancelTicket(id) {
    if (!confirm("Bạn có chắc chắn muốn hủy vé #" + id + " không?")) return;

    fetch('/staff/booking/api/cancel/' + id, { method: 'POST' })
        .then(r => r.json())
        .then(data => {
            if (data.message === "Hủy vé thành công") {
                alert("Đã hủy vé!");
                location.reload();
            } else {
                alert(data.message);
            }
        });
  }

  function closeModal() {
      document.getElementById('detailModal').classList.add('hidden');
  }
</script>
</body>
</html>
