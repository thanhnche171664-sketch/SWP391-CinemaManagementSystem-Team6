<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Hệ thống POS - CinemaHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="p-8">
<div class="max-w-6xl mx-auto">
  <h1 class="text-3xl font-black mb-8 flex items-center gap-3 text-slate-900">
    <i data-lucide="layout-dashboard" class="text-blue-600"></i> Quầy Bán Vé (POS)
  </h1>

  <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <div th:each="movie : ${movies}" class="bg-white p-5 rounded-2xl shadow-sm border border-slate-100 hover:shadow-lg transition">
      <img th:src="${movie.posterUrl}" class="w-full h-56 object-cover rounded-xl mb-4">
      <h3 class="font-bold text-slate-800 truncate" th:text="${movie.title}"></h3>
      <button th:data-id="${movie.movieId}"
              onclick="window.location.href='/staff/booking/showtimes/' + this.getAttribute('data-id')"
              class="mt-4 w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-blue-600 transition">
        Chọn suất chiếu
      </button>
    </div>
  </div>
</div>
<script>
  lucide.createIcons();
</script>
</body>
</html>
