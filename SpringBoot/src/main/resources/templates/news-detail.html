<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${news.title} + ' - Tin tức'">Chi tiết tin tức</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="news-detail-page">
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<section class="container py-4">
    <p class="mb-3">
        <a th:href="@{/news}" class="btn btn-outline-secondary btn-sm">← Quay lại News</a>
    </p>

    <article class="news-detail-article">
        <h1 class="news-detail-title" th:text="${news.title}">Tiêu đề tin tức</h1>
        <div class="news-detail-meta">
            <span th:text="${news.newsType}">announcement</span>
            <span th:text="${news.branch != null ? news.branch.branchName : 'Toàn hệ thống'}">Toàn hệ thống</span>
            <span th:text="${news.publishedAt != null ? #temporals.format(news.publishedAt, 'dd/MM/yyyy HH:mm') : ''}"></span>
        </div>

        <div class="news-detail-layout">
            <div class="news-detail-left">
                <img th:if="${news.thumbnailUrl != null and !#strings.isEmpty(news.thumbnailUrl)}"
                     th:src="${news.thumbnailUrl}" th:alt="${news.title}" class="news-detail-image">
                <div class="news-detail-noimage" th:unless="${news.thumbnailUrl != null and !#strings.isEmpty(news.thumbnailUrl)}">
                    No Image
                </div>
            </div>
            <div class="news-detail-right">
                <div class="news-detail-content" th:text="${news.content}">Nội dung chi tiết...</div>
            </div>
        </div>
    </article>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
