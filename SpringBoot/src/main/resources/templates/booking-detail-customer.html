<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết đặt vé - Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="booking-detail-page">
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<div class="container py-4">
    <div class="detail-shell">
    <p class="mb-3">
        <a th:href="@{/booking/history}" class="btn btn-outline-light btn-sm history-btn-secondary">← Quay lại lịch sử</a>
    </p>
    <h2 class="mb-1">Chi tiết đặt vé</h2>
    <p class="history-subtitle mb-3">Thông tin đặt vé và các giao dịch thanh toán.</p>

    <div class="booking-detail-card mb-4">
        <div class="booking-detail-row">
            <strong>Mã vé:</strong> <span th:text="${booking.bookingId}"></span>
        </div>
        <div class="booking-detail-row">
            <strong>Thời gian đặt:</strong> <span th:text="${#temporals.format(booking.bookingTime, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
        <div class="booking-detail-row">
            <strong>Trạng thái:</strong>
            <span class="booking-chip" th:classappend="${' status-' + booking.status}" th:text="${booking.status}"></span>
        </div>
        <div class="booking-detail-row">
            <strong>Phim:</strong> <span th:text="${booking.movieTitle}"></span>
        </div>
        <div class="booking-detail-row">
            <strong>Suất chiếu:</strong>
            <span th:text="${#temporals.format(booking.showtimeStart, 'dd/MM/yyyy HH:mm')}"></span>
            <span>–</span>
            <span th:text="${#temporals.format(booking.showtimeEnd, 'dd/MM/yyyy HH:mm')}"></span>
        </div>
        <div class="booking-detail-row">
            <strong>Phòng:</strong> <span th:text="${booking.roomName}"></span> – <span th:text="${booking.branchName}"></span>
        </div>
        <div class="booking-detail-row">
            <strong>Ghế:</strong> <span th:text="${#lists.isEmpty(booking.seats) ? 'N/A' : #strings.listJoin(booking.seats, ', ')}"></span>
        </div>
        <div class="booking-detail-row">
            <strong>Tổng tiền:</strong> <span th:text="${booking.totalAmount} + ' VND'"></span>
        </div>
    </div>

    <div th:if="${!#lists.isEmpty(booking.payments)}">
        <h5 class="mb-3">Thanh toán</h5>
        <div class="table-responsive history-table-wrap">
        <table class="table history-table">
            <tbody>
                <tr th:each="p : ${booking.payments}">
                    <td th:text="${#temporals.format(p.paymentTime, 'dd/MM/yyyy HH:mm')}"></td>
                    <td th:text="${p.method}"></td>
                    <td>
                        <span class="booking-chip payment-chip"
                              th:classappend="${' payment-' + p.status}"
                              th:text="${p.status}"></span>
                    </td>
                    <td th:text="${p.amount} + ' VND'"></td>
                </tr>
            </tbody>
        </table>
        </div>
    </div>

    <div class="d-flex gap-2 mt-3">
        <a th:href="@{/booking/history}" class="btn btn-light history-btn-primary">Quay lại lịch sử</a>
        <a th:href="@{/}" class="btn btn-outline-light history-btn-secondary">Về trang chủ</a>
    </div>
    </div>
</div>
</body>
</html>
