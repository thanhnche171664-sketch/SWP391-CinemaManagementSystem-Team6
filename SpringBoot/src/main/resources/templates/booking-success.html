<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt vé thành công - Cinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/public-header :: publicHeader}"></div>

<div class="container py-5 text-center">
    <h1 class="text-success mb-4">Thanh toán thành công</h1>
    <p class="lead">Cảm ơn bạn đã đặt vé. Chi tiết đơn hàng:</p>
    <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-body text-start">
            <p><strong>Mã vé:</strong> <span th:text="${booking.bookingId}"></span></p>
            <p><strong>Phim:</strong> <span th:text="${booking.movieTitle}"></span></p>
            <p><strong>Suất chiếu:</strong> <span th:text="${#temporals.format(booking.showtimeStart, 'dd/MM/yyyy HH:mm')}"></span></p>
            <p><strong>Phòng:</strong> <span th:text="${booking.roomName}"></span> – <span th:text="${booking.branchName}"></span></p>
            <p><strong>Ghế:</strong> <span th:text="${#lists.isEmpty(booking.seats) ? 'N/A' : #strings.listJoin(booking.seats, ', ')}"></span></p>
            <p><strong>Tổng tiền:</strong> <span th:text="${booking.totalAmount} + ' VND'"></span></p>
        </div>
    </div>
    <div class="mt-4">
        <a th:href="@{/booking/detail/{id}(id=${booking.bookingId})}" class="btn btn-primary">Xem chi tiết</a>
        <a th:href="@{/booking/history}" class="btn btn-secondary">Lịch sử đặt vé</a>
        <a th:href="@{/movies}" class="btn btn-outline-primary">Đặt vé khác</a>
    </div>
</div>
</body>
</html>
