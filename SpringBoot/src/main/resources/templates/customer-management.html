<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khách hàng - Cinema System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-color: #1f5aa6;
            --text-color: #1f3b67;
            --text-muted: #6a7a93;
            --surface-color: #ffffff;
            --surface-muted: #fff5f7;
            --border-soft: #f0c9d1;
            --accent-pink: #ffe9ed;
            --accent-pink-strong: #fff0f3;
        }

        body.admin-tone { background: var(--surface-muted); color: var(--text-color); }
        .layout { display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--surface-color); padding: 20px; border-right: 1px solid var(--border-soft); }
        .content { flex: 1; padding: 40px; overflow-y: auto; }
        .sidebar nav a {
            display: block; padding: 12px 15px; margin-bottom: 8px;
            color: var(--text-muted); text-decoration: none; border-radius: 8px;
        }
        .sidebar nav a.active, .sidebar nav a:hover { background: var(--accent-pink); color: var(--text-color); }
        .sidebar nav a.active { background: var(--primary-color); color: #fff; }
        .sidebar-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
            position: relative;
        }

        .logo { margin-bottom: 0; font-size: 18px; font-weight: 700; letter-spacing: 0.2px; color: var(--text-color); }

        .admin-user-menu { position: relative; }
        .admin-user-trigger {
            list-style: none;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--primary-color);
            border: 1px solid var(--primary-color);
            border-radius: 999px;
            padding: 6px 10px;
            cursor: pointer;
            user-select: none;
        }
        .admin-user-trigger::-webkit-details-marker { display: none; }
        .admin-user-trigger::marker { content: ""; }
        .admin-user-name-short {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }
        .admin-user-caret { font-size: 11px; color: #fff; }
        .admin-user-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 150px;
            border: 1px solid var(--border-soft);
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 14px 30px rgba(31, 90, 166, 0.14);
            overflow: hidden;
            z-index: 30;
        }
        .admin-user-link {
            display: block;
            padding: 10px 12px;
            text-decoration: none;
            color: var(--text-color);
            font-size: 14px;
        }
        .admin-user-link:hover { background: #fff4f6; }
        .logout-link { color: #c6425b; }
        .sidebar nav { margin-top: 10px; }

        .panel-title { color: var(--text-color); }
        .panel-subtitle { color: var(--text-muted); }

        .panel-input,
        .panel-select {
            background: #fff !important;
            border: 1px solid var(--border-soft) !important;
            color: var(--text-color) !important;
        }

        .panel-card {
            background: #fff;
            border: 1px solid var(--border-soft);
            box-shadow: 0 12px 30px rgba(31, 90, 166, 0.08);
        }

        .panel-thead { background: var(--accent-pink-strong); border-bottom: 1px solid var(--border-soft); }
        .panel-row { border-bottom: 1px solid var(--border-soft); }
        .panel-row:hover { background: #fff6f7; }

        .panel-muted { color: var(--text-muted); }
        .panel-strong { color: var(--text-color); }

        #customerModal { background: rgba(31, 59, 103, 0.25); }
        .panel-modal {
            background: #fff;
            border: 1px solid var(--border-soft);
            box-shadow: 0 20px 60px rgba(31, 90, 166, 0.2);
        }
        .panel-modal-title { color: var(--text-color); border-bottom: 1px solid var(--border-soft); }
        .panel-divider { border-top: 1px solid var(--border-soft); }
        .panel-btn-secondary { color: var(--text-muted); }
        .panel-btn-secondary:hover { color: var(--text-color); }
        .panel-btn-primary {
            background: var(--primary-color);
            color: #fff;
        }
        .panel-btn-primary:hover { background: #184a8a; }
    </style>
</head>
<body class="admin-tone">

<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar('customers')}"></div>

    <div class="content">
        <div class="header flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold uppercase tracking-tight panel-title">Quản lý Khách hàng</h1>
                <p class="mt-1 panel-subtitle">Danh sách thành viên đăng ký và quản lý tài khoản.</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="relative col-span-2">
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm tên, email, số điện thoại..."
                       class="panel-input w-full rounded-xl p-3 pl-10 outline-none transition">
                <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 panel-muted"></i>
            </div>

            <select id="statusFilter" onchange="filterTable()" class="panel-select rounded-xl p-3 outline-none cursor-pointer">
                <option value="">Tất cả trạng thái</option>
                <option value="Hoạt động">Hoạt động</option>
                <option value="Tạm khóa">Tạm khóa</option>
            </select>
        </div>

        <div class="panel-card rounded-2xl overflow-hidden">
            <table class="panel-table w-full text-left" id="customerTable">
                <thead class="panel-thead">
                <tr>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">ID</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Họ và tên</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Thông tin liên hệ</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Ngày đăng ký</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs">Trạng thái</th>
                    <th class="p-4 panel-muted font-medium uppercase text-xs text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody id="customerTableBody">
                <tr th:each="c : ${customerList}" class="panel-row transition">
                    <td class="p-4 panel-muted font-mono text-sm" th:text="${c.user_id}"></td>
                    <td class="p-4 font-bold panel-strong" th:text="${c.full_name}"></td>
                    <td class="p-4">
                        <div class="text-sm panel-strong" th:text="${c.email}"></div>
                        <div class="text-xs panel-muted" th:text="${c.phone}"></div>
                    </td>
                    <td class="p-4 panel-muted text-sm" th:text="${#temporals.format(c.created_at, 'dd/MM/yyyy')}"></td>
                    <td class="p-4">
                        <a th:href="@{'/admin/customers/toggle/' + ${c.user_id}}" class="inline-flex items-center gap-2 group">
                            <span th:class="${c.status == 'active' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.5)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]'} + ' w-2 h-2 rounded-full'"></span>
                            <span th:text="${c.status == 'active' ? 'Hoạt động' : 'Tạm khóa'}" class="text-sm font-medium panel-strong transition"></span>
                        </a>
                    </td>
                    <td class="p-4 text-right">
                        <button type="button" th:onclick="prepareEdit([[${c}]])" class="panel-muted hover:text-[#1f5aa6] transition">
                            <i data-lucide="edit-3" class="w-5 h-5"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div id="customerModal" class="hidden fixed inset-0 backdrop-blur-md flex items-center justify-center z-50">
    <div class="panel-modal rounded-3xl p-8 w-full max-w-lg transition-all">
        <h2 class="panel-modal-title text-2xl font-bold mb-6 pb-4 uppercase tracking-tighter">Cập nhật Khách hàng</h2>
        <form th:action="@{/admin/customers/update}" th:object="${editedCustomer}" method="POST" class="space-y-6">
            <input type="hidden" th:field="*{user_id}" id="form-id">

            <div>
                <label class="block text-xs font-bold panel-muted uppercase mb-2 tracking-widest">Họ tên khách hàng</label>
                <input type="text" th:field="*{full_name}" id="form-name" required
                       class="panel-input w-full rounded-xl p-3 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-bold panel-muted uppercase mb-2 tracking-widest">Số điện thoại</label>
                <input type="text" th:field="*{phone}" id="form-phone" required
                       class="panel-input w-full rounded-xl p-3 outline-none transition">
            </div>

            <div>
                <label class="block text-xs font-bold panel-muted uppercase mb-2 tracking-widest">Trạng thái tài khoản</label>
                <select th:field="*{status}" id="form-status"
                        class="panel-select w-full rounded-xl p-3 outline-none transition cursor-pointer">
                    <option value="active">Hoạt động</option>
                    <option value="inactive">Tạm khóa</option>
                </select>
            </div>

            <div class="panel-divider flex justify-end gap-4 mt-8 pt-4">
                <button type="button" onclick="closeModal()" class="panel-btn-secondary px-6 py-2.5 font-bold transition uppercase text-sm">Hủy</button>
                <button type="submit" class="panel-btn-primary px-8 py-2.5 rounded-xl font-black transition uppercase text-sm">Cập nhật</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const statusValue = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('#customerTableBody tr');

        rows.forEach(row => {
            const name = row.cells[1].innerText.toLowerCase();
            const contact = row.cells[2].innerText.toLowerCase();
            const status = row.cells[4].innerText.trim();

            const matchesSearch = name.includes(searchText) || contact.includes(searchText);
            const matchesStatus = statusValue === "" || status.includes(statusValue);

            row.style.display = (matchesSearch && matchesStatus) ? "" : "none";
        });
    }

    function prepareEdit(c) {
        document.getElementById('form-id').value = c.user_id;
        document.getElementById('form-name').value = c.full_name;
        document.getElementById('form-phone').value = c.phone;
        document.getElementById('form-status').value = c.status;

        const modal = document.getElementById('customerModal');
        modal.classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('customerModal').classList.add('hidden');
    }

    window.onclick = function(e) {
        const modal = document.getElementById('customerModal');
        if (e.target === modal) closeModal();
    }
</script>
</body>
</html>
