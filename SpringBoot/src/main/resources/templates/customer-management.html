<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Khách hàng - Cinema System</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
    <link rel="stylesheet" th:href="@{/styles/admin-user-management.css}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<div class="layout">
    <div th:replace="~{fragments/sidebar :: sidebar('customers')}"></div>

    <main class="content">
        <div class="header">
            <div>
                <h1>Quản lý khách hàng</h1>
                <p class="page-subtitle">Danh sách thành viên đăng ký và quản lý tài khoản</p>
            </div>
        </div>

        <div class="filters">
            <div class="search-box has-icon">
                <span class="search-icon"><i data-lucide="search"></i></span>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Tìm tên, email, số điện thoại..."
                       class="form-input">
            </div>

            <select id="statusFilter" onchange="filterTable()" class="filter-select">
                <option value="">Tất cả trạng thái</option>
                <option value="Hoạt động">Hoạt động</option>
                <option value="Tạm khóa">Tạm khóa</option>
            </select>
        </div>

        <div class="table-card">
            <table class="data-table" id="customerTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Họ và tên</th>
                    <th>Thông tin liên hệ</th>
                    <th>Ngày đăng ký</th>
                    <th>Trạng thái</th>
                    <th class="text-right">Thao tác</th>
                </tr>
                </thead>
                <tbody id="customerTableBody">
                <tr th:each="c : ${customerList}">
                    <td class="mono text-muted" th:text="${c.user_id}"></td>
                    <td class="entity-name" th:text="${c.full_name}"></td>
                    <td>
                        <div th:text="${c.email}"></div>
                        <div class="entity-sub" th:text="${c.phone}"></div>
                    </td>
                    <td class="text-muted" th:text="${#temporals.format(c.created_at, 'dd/MM/yyyy')}"></td>
                    <td>
                        <span class="status-badge-soft"
                              th:classappend="${c.status == 'active' ? ' active' : ' inactive'}"
                              th:text="${c.status == 'active' ? 'Hoạt động' : 'Tạm khóa'}"></span>
                    </td>
                    <td class="action-cell">
                        <div class="action-buttons">
                            <button type="button"
                                    th:data-id="${c.user_id}"
                                    th:data-name="${c.full_name}"
                                    onclick="showHistory(this.getAttribute('data-id'), this.getAttribute('data-name'))"
                                    class="icon-btn" title="Lịch sử đặt vé">
                                <i data-lucide="ticket"></i>
                            </button>

                            <button type="button"
                                    th:data-id="${c.user_id}"
                                    th:data-name="${c.full_name}"
                                    th:data-status="${c.status}"
                                    onclick="handleEditClick(this)"
                                    class="icon-btn" title="Sửa trạng thái">
                                <i data-lucide="edit-3"></i>
                            </button>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="table-footer" th:if="${totalPages > 0}">
                <div class="text-muted">
                    Trang <strong th:text="${currentPage + 1}"></strong> / <span th:text="${totalPages}"></span>
                </div>

                <div class="pagination">
                    <a th:href="@{/admin/customers(page=${currentPage - 1})}"
                       th:classappend="${currentPage == 0} ? ' disabled' : ''"
                       class="page-link">
                        <i data-lucide="chevron-left"></i>
                    </a>

                    <a th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                       th:href="@{/admin/customers(page=${i})}"
                       th:text="${i + 1}"
                       th:classappend="${currentPage == i} ? ' active' : ''"
                       class="page-link">
                    </a>

                    <a th:href="@{/admin/customers(page=${currentPage + 1})}"
                       th:classappend="${currentPage + 1 >= totalPages} ? ' disabled' : ''"
                       class="page-link">
                        <i data-lucide="chevron-right"></i>
                    </a>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="customerModal" class="modal-backdrop hidden">
    <div class="modal" style="max-width: 560px;">
        <h2 class="modal-title">Cập nhật trạng thái</h2>
        <form th:action="@{/admin/customers/update}" th:object="${editedCustomer}" method="POST" class="form-grid">
            <input type="hidden" th:field="*{user_id}" id="form-id">
            <div class="form-group full">
                <label class="form-label">Họ tên khách hàng</label>
                <input type="text" th:field="*{full_name}" id="form-name" readonly class="form-input" style="background: #fff6f8;">
            </div>
            <div class="form-group full">
                <label class="form-label">Trạng thái tài khoản</label>
                <select th:field="*{status}" id="form-status" class="form-select">
                    <option value="active">Hoạt động</option>
                    <option value="inactive">Tạm khóa</option>
                </select>
            </div>
            <div class="modal-actions" style="grid-column: span 2;">
                <button type="button" onclick="closeModal()" class="btn-secondary">Hủy</button>
                <button type="submit" class="btn-primary">Xác nhận</button>
            </div>
        </form>
    </div>
</div>

<div id="bookingHistoryModal" class="modal-backdrop hidden">
    <div class="modal modal-lg">
        <div class="header" style="margin-bottom: 12px; border-bottom: 1px solid var(--border-soft); padding-bottom: 12px;">
            <div>
                <h2 class="modal-title" style="border-bottom: none; margin-bottom: 0; padding-bottom: 0;">Lịch sử giao dịch</h2>
                <p class="history-name" id="historyCustomerName"></p>
            </div>
            <button onclick="closeHistoryModal()" class="icon-btn" type="button">
                <i data-lucide="x"></i>
            </button>
        </div>

        <div class="history-table-wrap">
            <table class="data-table">
                <thead>
                <tr>
                    <th>Mã đơn</th>
                    <th>Phim & Rạp</th>
                    <th>Ghế</th>
                    <th class="text-right">Tổng tiền</th>
                    <th class="text-right">Ngày đặt</th>
                </tr>
                </thead>
                <tbody id="bookingHistoryTableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script th:inline="javascript">
    lucide.createIcons();

    function filterTable() {
        const searchText = document.getElementById('searchInput').value.toLowerCase();
        const statusValue = document.getElementById('statusFilter').value;
        const rows = document.querySelectorAll('#customerTableBody tr');
        rows.forEach(row => {
            const name = row.cells[1].innerText.toLowerCase();
            const contact = row.cells[2].innerText.toLowerCase();
            const status = row.cells[4].innerText.trim();
            const matchesSearch = name.includes(searchText) || contact.includes(searchText);
            const matchesStatus = statusValue === "" || status.includes(statusValue);
            row.style.display = (matchesSearch && matchesStatus) ? "" : "none";
        });
    }

    async function showHistory(userId, fullName) {
        document.getElementById('historyCustomerName').innerText = "Khách hàng: " + fullName;
        const tableBody = document.getElementById('bookingHistoryTableBody');

        tableBody.innerHTML = '<tr><td colspan="5" class="text-muted">Đang tải lịch sử giao dịch...</td></tr>';
        document.getElementById('bookingHistoryModal').classList.remove('hidden');

        try {
            const response = await fetch(`/admin/customers/api/bookings/${userId}`);
            const bookings = await response.json();

            if (bookings.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" class="text-muted">Khách hàng này chưa có đơn hàng nào.</td></tr>';
            } else {
                tableBody.innerHTML = bookings.map(b => `
                    <tr>
                        <td class="mono">#${b.booking_id}</td>
                        <td>
                            <div class="entity-name">${b.movie_title}</div>
                            <div class="entity-sub">${b.branch_name}</div>
                        </td>
                        <td>
                            <span class="role-badge role-manager">${b.seat_names}</span>
                        </td>
                        <td class="text-right"><strong>${new Intl.NumberFormat().format(b.total_amount)} đ</strong></td>
                        <td class="text-right mono text-muted">${b.booking_time.replace('T', ' ').substring(0, 16)}</td>
                    </tr>
                `).join('');
            }
        } catch (error) {
            tableBody.innerHTML = '<tr><td colspan="5">Không thể tải dữ liệu. Vui lòng thử lại sau!</td></tr>';
        }
        lucide.createIcons();
    }

    function closeHistoryModal() {
        document.getElementById('bookingHistoryModal').classList.add('hidden');
    }

    function handleEditClick(btn) {
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        const status = btn.getAttribute('data-status');

        document.getElementById('form-id').value = id;
        document.getElementById('form-name').value = name;
        document.getElementById('form-status').value = status;
        document.getElementById('customerModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('customerModal').classList.add('hidden');
    }

    window.onclick = function(e) {
        if (e.target.id === 'customerModal') closeModal();
        if (e.target.id === 'bookingHistoryModal') closeHistoryModal();
    }
</script>
</body>
</html>
