<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Management System - Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="home-page">
    <div th:replace="~{fragments/public-header :: publicHeader}"></div>

    <section class="home-hero">
        <div class="container text-center text-lg-start">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h1 class="display-4">Welcome to Cinema Management System</h1>
                    <p class="lead">Book your favorite movies online</p>
                    <a th:href="@{/movies}" class="btn btn-light btn-lg home-hero-btn">Browse Movies</a>
                </div>
            </div>
        </div>
    </section>

    <section class="container py-5 home-now-showing">
        <h2 class="text-center mb-4">Now Showing</h2>
        <div class="row g-4">
            <div class="col-md-4" th:each="movie : ${movies}">
                <div class="card h-100 movie-home-card">
                    <div class="movie-poster">
                        <img th:if="${movie.posterUrl}" th:src="${movie.posterUrl}" th:alt="${movie.title}">
                        <div class="poster-placeholder" th:unless="${movie.posterUrl}">No Image</div>
                    </div>
                    <div class="card-body">
                        <h5 class="card-title" th:text="${movie.title}">Movie Title</h5>
                        <p class="card-text home-description" th:text="${movie.description}">Movie description...</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge home-genre-badge" th:text="${movie.genreNames}">Genre</span>
                            <span class="home-meta-text" th:text="${movie.duration} + ' min'">120 min</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a th:href="@{/movies/{id}(id=${movie.movieId})}" class="btn btn-outline-light w-100">View Details</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p>&copy; 2026 Cinema Management System - Team 6. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
