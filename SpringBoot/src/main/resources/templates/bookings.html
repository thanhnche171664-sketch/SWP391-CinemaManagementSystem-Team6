<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vé của tôi - CinemaHub</title>
    <link rel="stylesheet" th:href="@{/styles/auth.css}">
    <style>
        .page-wrap { min-height: 100vh; background: #0a0a0a; color: #fff; display: flex; flex-direction: column; }
        .main-wrap { flex: 1; padding: 24px; max-width: 800px; margin: 0 auto; width: 100%; }
        .booking-list { display: flex; flex-direction: column; gap: 16px; }
        .booking-card { background: rgba(22,22,22,0.95); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .booking-card h3 { font-size: 1.1rem; margin-bottom: 4px; }
        .booking-card .meta { color: #888; font-size: 0.9rem; }
        .booking-card a { color: #e50914; text-decoration: none; font-weight: 600; }
        .status { padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; }
        .status.paid { background: rgba(34,197,94,0.2); color: #86efac; }
        .status.pending { background: rgba(234,179,8,0.2); color: #fde047; }
    </style>
</head>
<body class="page-wrap">
<header class="auth-header">
    <a th:href="@{/movies}" class="auth-logo">
        <span class="auth-logo-icon">&#127917;</span>
        <span>CinemaHub</span>
    </a>
    <nav class="auth-nav">
        <a th:href="@{/movies}">Phim</a>
        <a th:href="@{/bookings}">Vé của tôi</a>
        <a th:href="@{/login}" th:if="${!isAuthenticated}">Đăng nhập</a>
        <form method="post" th:action="@{/logout}" th:if="${isAuthenticated and _csrf != null}" style="display: inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit">Đăng xuất</button>
        </form>
    </nav>
</header>
<main class="main-wrap">
    <h1 style="margin-bottom: 8px;">Vé của tôi</h1>
    <p style="color: #888; margin-bottom: 24px;">Danh sách đặt vé của bạn</p>
    <div class="booking-list" th:if="${!#lists.isEmpty(bookings)}">
        <div class="booking-card" th:each="b : ${bookings}">
            <div>
                <h3 th:text="${b.showtime.movie.title}">Phim</h3>
                <p class="meta" th:text="${#temporals.format(b.showtime.startTime, 'dd/MM/yyyy HH:mm') + ' - ' + b.showtime.room.branch.branchName}">Ngày - Rạp</p>
            </div>
            <div>
                <span class="status" th:classappend="${b.status.name() == 'paid' ? 'paid' : 'pending'}" th:text="${b.status.name() == 'paid' ? 'Đã thanh toán' : 'Chờ thanh toán'}">Trạng thái</span>
                <a th:href="@{/bookings/{id}(id=${b.bookingId})}" style="margin-left: 12px;">Chi tiết</a>
            </div>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(bookings)}" style="color: #888;">Bạn chưa có đặt vé nào.</p>
</main>
</body>
</html>
