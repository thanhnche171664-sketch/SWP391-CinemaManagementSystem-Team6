<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật rạp</title>
    <link rel="stylesheet" th:href="@{/styles/admin-branch.css}">
</head>
<body>

<div class="layout">

    <div th:replace="fragments/sidebar :: sidebar('branches')"></div>

    <main class="content">

        <header class="header">
            <div>
                <a th:href="${branchBasePath}" class="btn-back">← Quay lại</a>
                <h1>Cập nhật rạp chiếu</h1>
                <p>Chỉnh sửa thông tin rạp</p>
            </div>
        </header>

        <div class="edit-branch-card">
            <form th:action="${branchBasePath + '/update/' + branch.branchId}"
                  th:object="${branch}"
                  method="post"
                  class="edit-branch-form">

                <div class="form-group">
                    <label for="branchName">Tên rạp</label>
                    <input id="branchName" type="text" th:field="*{branchName}" required>
                </div>

                <div class="form-group">
                    <label for="city">Thành phố</label>
                    <input id="city" type="text" th:field="*{city}" required>
                </div>

                <div class="form-group full">
                    <label for="address">Địa chỉ</label>
                    <input id="address" type="text" th:field="*{address}" required>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-add">Cập nhật</button>
                    <a th:href="${branchBasePath}" class="btn-cancel">Hủy</a>
                </div>
            </form>
            </div>

    </main>
</div>

</body>
</html>
